// Generiere 3 tägliche Missionen basierend auf gameDay + cityIdx
function genDailyMissions(gameDay, cityIdx) {
  const seed = gameDay * 31 + cityIdx * 7;
  const pool = [...DAILY_MISSION_POOL];
  const chosen = [];
  let s = seed;
  while (chosen.length < 3 && pool.length > 0) {
    s = (s * 1664525 + 1013904223) & 0x7fffffff;
    const idx = s % pool.length;
    chosen.push({...pool[idx], current:0, claimed:false});
    pool.splice(idx, 1);
  }
  return chosen;
}

// 3 Stufen (statt 5), +30% pro Stufe (statt +20%) — spürbarer
// Jede Stufe setzt Fabrik-Aufbau voraus:
//   Stufe 1 (Sport): Nur Geld
//   Stufe 2 (Premium): Mind. 7 Stationen freigeschaltet
//   Stufe 3 (Legende): Alle Stadt-Stationen + 1 Station auf Max
// ═══════════════════════════════════════════════════════
const MODEL_UPGRADE_LEVELS = 3;
const MODEL_UPGRADE_COST_MULT = [2.0, 8.0, 30.0]; // × val
const MODEL_UPGRADE_BONUS = 0.30; // +30% pro Stufe

const MODEL_UPGRADE_ICONS = ["🔧", "⭐", "👑"];

// Check ob Upgrade-Stufe freigeschaltet ist (basierend auf Fabrik-Aufbau)
function canUpgradeToLevel(targetLevel, ci, stationUpgrades) {
  const activeStations = STATIONS.filter(s => s.city <= ci).length;
  const maxLevelStations = STATIONS.filter(s => s.city <= ci && (stationUpgrades||{})[s.id] >= STATION_UPGRADE_LEVELS).length;
  if (targetLevel === 1) return { ok:true };
  if (targetLevel === 2) {
    if (activeStations < 7) return { ok:false, reason:`Benötigt 7 freigeschaltete Stationen (${activeStations}/7)` };
    return { ok:true };
  }
  if (targetLevel === 3) {
    if (activeStations < STATIONS.length) return { ok:false, reason:`Benötigt ALLE ${STATIONS.length} Stationen (${activeStations}/${STATIONS.length})` };
    if (maxLevelStations < 1) return { ok:false, reason:"Benötigt mind. 1 Station auf MAX-Stufe" };
    return { ok:true };
  }
  return { ok:false };
}

}));

// Helper: get all buildable models for a city (base + unlocked blueprints)
function getBuildableModels(ci, unlockedModels) {
  const base = (CITY_MODELS[cl(ci, 0, CITY_MODELS.length-1)] || []).filter(m=>(unlockedModels||{})[m.id]);
  const bps = BLUEPRINT_MODELS.filter(m => m.cityIdx===ci && (unlockedModels||{})[m.id]);
  return [...base, ...bps];
}

// Build flat tree with depth for each category
function flattenTree(cat) {
  const nodes = TECH_TREE.filter(t => t.cat === cat);
  const result = [];
  function walk(reqId, depth) {
    nodes.filter(n => (n.req||null) === reqId).forEach(n => {
      result.push({ ...n, depth });
      walk(n.id, depth + 1);
    });
  }
  walk(null, 0);
  return result;
}

function pickCustomer(car, ci) {
  // Weighted random pick, but favor customers that match the car
  const totalWeight = CUSTOMERS.reduce((s,c)=>s+c.weight, 0);
  let r = Math.random() * totalWeight;
  for (const c of CUSTOMERS) {
    r -= c.weight;
    if (r <= 0) return c.id;
  }
  return CUSTOMERS[0].id;
}

function getCustomerPayout(car, customerId, baseVal) {
  const cust = CUSTOMERS.find(c=>c.id===customerId) || CUSTOMERS[0];
  let mult = cust.mult;
  // Match bonus logic
  const isTuned = (car.tuned||0) > 0 || (car.appliedTuning||[]).length > 0;
  const isProto = (car.modelId||"").startsWith("proto_");
  const isLuxury = baseVal >= 100000;
  const isPremium = baseVal >= 500000;
  const isTech = (car.modelId||"").match(/id\.|ev|cyber|quantum|hiphi|tesla|neural/i);
  let matched = false;
  switch(cust.prefers) {
    case "tuned":   matched = isTuned; break;
    case "proto":   matched = isProto; break;
    case "luxury":  matched = isLuxury; break;
    case "premium": matched = isPremium; break;
    case "tech":    matched = !!isTech; break;
    case "any":     matched = true; break;
  }
  // If the customer wants a specific type and doesn't get it, they pay base (1.0)
  if (!matched && cust.prefers !== "any") mult = 1.0;
  return { mult, matched, customer: cust };
}

function genContract(ci, isVip, unlockedModels, vipMult) {
  const allMs = CITY_MODELS[cl(ci,0,CITY_MODELS.length-1)];
  // Only offer contracts for models the player has unlocked
  const ms = unlockedModels
    ? allMs.filter(m=>unlockedModels[m.id])
    : allMs.slice(0,1); // fallback: only slot-0
  const pool = ms.length > 0 ? ms : allMs.slice(0,1);
  const m  = pool[Math.floor(Math.random()*pool.length)];
  const q  = isVip ? 1 + Math.floor(Math.random()*2) : 2 + Math.floor(Math.random()*4);
  const vipM = vipMult||1.0;
  const mult = isVip ? (3.0+Math.random()*1.5)*vipM : (1.3+Math.random()*0.5);
  return {
    id:_cid++, modelId:m.id, emoji:m.emoji, name:m.name,
    qty:q, filled:0,
    reward:Math.round(m.val*q*mult),
    ticksLeft: isVip ? 250+q*80 : 600+q*150,
    isVip: isVip||false,
  };
}

// Apply specialty modifiers to multipliers
function applySpecialty(baseValueMult, baseSpeedMult, baseWageMult, baseContractMult, ci) {
  const sp = getCitySpecialty(ci);
  const out = { value: baseValueMult, speed: baseSpeedMult, wage: baseWageMult, contract: baseContractMult };
  switch(sp.effect) {
    case "wage-20":     out.wage *= 0.80; break;
    case "value+15":    out.value *= 1.15; break;
    case "speed+20":    out.speed *= 0.833; break; // speed mult is INVERTED (lower = faster)
    case "speed+35":    out.speed *= 0.74; break;
    case "value+25":    out.value *= 1.25; break;
    case "value+40":    out.value *= 1.40; break;
    case "contract+40": out.contract *= 1.40; break;
    case "income+30":   out.value *= 1.15; out.contract *= 1.15; break; // split bonus
    case "all×1.5":     out.value *= 1.5; out.contract *= 1.5; out.speed *= 0.67; out.wage *= 0.67; break;
    // Other effects applied elsewhere (research cost, vip, tuning, etc)
  }
  return out;
}

// Station upgrade levels: 3 tiers per station, each adding +3% quality bonus
// Cost scales with station index (later stations cost more to upgrade)
const STATION_UPGRADE_LEVELS = 3;
const STATION_UPGRADE_BONUS = 0.03; // +3% per upgrade level
// Cost formula: baseCost × multiplier[level] × (1 + stationIdx × 0.8)
// Wolfsburg stations cheap, late-game stations expensive
function getStationUpgradeCost(stationIdx, currentLevel) {
  const mults = [1, 8, 40]; // level 1 = 1x, level 2 = 8x, level 3 = 40x
  const baseCost = 15000;
  return Math.round(baseCost * mults[currentLevel] * Math.pow(1.6, stationIdx));
}
// Total station-value bonus: base 3% per station + upgrades
function getStationValueBonus(ci, stationUpgrades) {
  const active = STATIONS.filter(s => s.city <= ci);
  const baseBonus = active.length * 0.03;
  const upgradeBonus = active.reduce((s, st) => 
    s + ((stationUpgrades||{})[st.id] || 0) * STATION_UPGRADE_BONUS, 0);
  return baseBonus + upgradeBonus;
}

// Worker contribution with diminishing returns:
// 1 worker = 1.0×, 2=1.6×, 3=2.1×, 4=2.5×, 5=2.9×, 6=3.2×, 7=3.5×, 8=3.8×
// Formula: workerCount^0.7
function getWorkerPowerMult(workerCount) {
  if (workerCount <= 0) return 0;
  if (workerCount === 1) return 1.0;
  return Math.pow(workerCount, 0.7);
}

function tickLine(line, activeSts, model, techs, lineSpecs) {
  if (!line.unlocked || line.workers===0) return line;
  const spd   = getSpeedMult(techs);
  const weff  = getWorkerEffMult(techs);
  const lmult = getLineSpdMult(line.id, techs, lineSpecs);
  // FIX: Diminishing returns — 8 workers doesn't give 8× speed
  const workerPower = getWorkerPowerMult(line.workers);
  const delta = (workerPower * weff * lmult * spd) / model.ticks;
  const si    = line.stIdx;
  if (si >= activeSts.length) return { ...line, ready:true, stIdx:0, prog:0 };
  const np = line.prog + delta;
  if (np >= 1.0) return { ...line, stIdx:si+1, prog:0 };
  return { ...line, prog:np };
}

function makeLines() {
  return Array.from({ length:MAX_LINES }, (_,i) => ({
    id:i, unlocked:i===0, modelId:'polo', workers:i===0?1:0, stIdx:0, prog:0, ready:false,
  }));
}

function tickGS(gs) {
  const ci       = cl(gs.cityIdx, 0, CITIES.length-1);
  const activeSts= STATIONS.filter(s => s.city <= ci);
  const models   = CITY_MODELS[ci];
  const maxL     = CITIES[ci].maxLines;
  const lineSpecs= gs.lineSpecs || {};
  const pb       = {speed:0, value:0, wage:0}; // Prestige-Boni entfernt

  // Event modifiers
  const ev       = gs.activeEvent;
  const evSpeed  = ev && ev.effect==="speed+20" ? 0.80 : (ev && ev.effect==="speed-30"||(ev||{}).effect==="shortage") ? 1.50 : 1.0;
  const evVal    = ev && ev.effect==="value+40" ? 1.40 : ev && ev.effect==="boom" ? 1.80 : 1.0;
  const evWage   = ev && ev.effect==="wage+100"  ? 2.0  : 1.0;

  let valMult      = getValMult(gs.techs) * evVal * (1 + (pb.value||0)/100);
  const maxContracts = getMaxContracts(gs.techs);
  const showroomMax  = getShowroomMax(gs.techs, lineSpecs);
  const wageMult     = getWageMult(gs.techs) * evWage * (1 - (pb.wage||0)/100);
  const dailyBonus   = getDailyBonus(gs.techs);

  // ── CITY SPECIALTY — apply per-city permanent effect ──
  let valMultFinal = valMult;
  let wageMultFinal = wageMult;
  let speedMultFinal = evSpeed;
  const __spec = getCitySpecialty(ci);
  if (__spec.effect === "wage-20")     wageMultFinal *= 0.80;
  if (__spec.effect === "value+15")    valMultFinal  *= 1.15;
  if (__spec.effect === "value+25")    valMultFinal  *= 1.25;
  if (__spec.effect === "value+40")    valMultFinal  *= 1.40;
  if (__spec.effect === "speed+20")    speedMultFinal *= 0.83;
  if (__spec.effect === "speed+35")    speedMultFinal *= 0.74;
  if (__spec.effect === "income+30") { valMultFinal  *= 1.15; /* contract bonus applied elsewhere */ }
  if (__spec.effect === "all×1.5")   { valMultFinal  *= 1.5; speedMultFinal *= 0.67; wageMultFinal *= 0.67; }

  // Event countdown  -  BUG FIX: clear _newEventFlag immediately
  let eventTicksLeft = (gs.eventTicksLeft||0) > 0 ? gs.eventTicksLeft-1 : 0;
  let activeEvent    = eventTicksLeft > 0 ? gs.activeEvent : null;

  // BUG FIX: streak resets when a contract expires
  const prevContractIds = new Set(gs.contracts.map(c=>c.id));
  let contracts = gs.contracts.map(c=>({...c,ticksLeft:c.ticksLeft-1})).filter(c=>c.ticksLeft>0);
  const expiredCount = gs.contracts.length - contracts.length;
  let streak = gs.streak || 0;
  if (expiredCount > 0) streak = 0; // BUG FIX: streak reset

  let dayTick = gs.dayTick + 1;
  let extra   = { dayTick, eventTicksLeft, activeEvent, streak };

  if (dayTick >= TICKS_DAY) {
    const engSalary = (gs.engineers||[]).reduce((s,e)=>{
      const eng = ENGINEER_POOL.find(p=>p.id===e.engId);
      return s + (eng ? eng.baseSalary * e.level : 0);
    }, 0);
    const wc = Math.round(gs.totalWorkers * 500 * wageMultFinal) + engSalary - dailyBonus;
    while (contracts.length < maxContracts) contracts = [...contracts, genContract(ci, false, gs.unlockedModels, 1.0)];

    // New event (30% chance, no _newEventFlag bug)
    let newEvent = activeEvent, newEvTicks = eventTicksLeft, newEvId = null;
    if (!activeEvent && Math.random() < 0.30) {
      newEvent   = DAILY_EVENTS[Math.floor(Math.random()*DAILY_EVENTS.length)];
      newEvTicks = TICKS_DAY * 2;
      newEvId    = newEvent.id;
    }

    // Week market (every 7 days)
    let weekMarket = gs.weekMarket;
    if (gs.gameDay % 7 === 0 && (!weekMarket || weekMarket.dayOpened !== gs.gameDay)) {
      const pool = [...MARKET_POOL].sort(()=>Math.random()-0.5).slice(0,3);
      weekMarket = { offers:pool, dayOpened:gs.gameDay, bought:[] };
    }

    // Season challenge progress
    let seasonChallenge = null; // Saison-Challenges entfernt
    if (false && !seasonChallenge) {
      const tmpl = SEASON_TEMPLATES[Math.floor(Math.random()*SEASON_TEMPLATES.length)];
      seasonChallenge = { ...tmpl, current:0, dayEnd:gs.gameDay+30 };
    }

    // Archive today's finance stats before resetting
    const todayStats = gs.dailyStats || { income:0, wages:0, engSalary:0, orderBonus:0 };
    const workerWagePart = Math.max(0, wc - engSalary + dailyBonus); // real worker cost
    const todayEntry = {
      day: gs.gameDay,
      income: todayStats.income || 0,
      orderBonus: todayStats.orderBonus || 0,
      wages: workerWagePart,
      engSalary: engSalary,
      net: (todayStats.income || 0) + (todayStats.orderBonus || 0) - workerWagePart - engSalary,
    };
    const newHistory = [...(gs.financeHistory||[]), todayEntry].slice(-14); // letzte 14 Tage
    extra = {
      money:Math.max(0, gs.money - wc), gameDay:gs.gameDay+1, dayTick:0,
      activeEvent:newEvent, eventTicksLeft:newEvTicks,
      _pendingEventId: newEvId,   // component reads this, then clears
      streak, weekMarket, seasonChallenge,
      financeHistory: newHistory,
      dailyStats: { income:0, wages:0, engSalary:0, orderBonus:0 }, // Reset
    };
  }

  const line1Stopped = ev && ev.effect==="line1stop";
  let parked     = [...gs.parked];
  let totalBuilt = gs.totalBuilt;
  let garage     = { ...(gs.garage||{}) };
  let seasonCh   = null; // Saison deaktiviert

  const newLines = gs.lines.map(line => {
    if (!line.unlocked || line.id >= maxL) return line;
    if (line1Stopped && line.id === 0) return line;
    const m0    = ALL_MODELS.find(m=>m.id===line.modelId) || models[0];
    const lsVal = getLineValBonus(line.id, lineSpecs);
    const model = { ...m0, ticks: Math.round(m0.ticks * speedMultFinal) };
    const t     = tickLine(line, activeSts, model, gs.techs, lineSpecs);
    if (t.ready && !line.ready) {
      if (parked.length < showroomMax) {
        const upgMult = getModelUpgradeMult(m0.id, gs.modelUpgrades);
        const stationBonus = 1 + getStationValueBonus(ci, gs.stationUpgrades||{});
        const carVal = Math.round(m0.val * valMultFinal * (1+lsVal) * upgMult * stationBonus);
        parked = [...parked, { id:uid(), modelId:m0.id, emoji:m0.emoji, name:m0.name, val:carVal, tuned:0, customerId: pickCustomer({modelId:m0.id,val:carVal}, ci) }];
        garage[m0.id] = (garage[m0.id]||0) + 1;
        totalBuilt++;
        // Season build progress
        if (seasonCh && seasonCh.type==="build") seasonCh = {...seasonCh, current:(seasonCh.current||0)+1};
      }
      return { ...t, ready:false };
    }
    return t;
  });

  // -- Tuning research tick --
  let tuningResearch = {...(gs.tuningResearch||{sport:0,super:0,hyper:0})};
  let tuningUnlocked = {...(gs.tuningUnlocked||{})};
  let _newTuningUnlock = null;
  // Also handle engineer blueprint research + tuning in one map
  let engineers = (gs.engineers||[]).map(eng => {
    // Tuning research
    if (eng.assignment === 'tuning' && eng.tuningId) {
      if (tuningUnlocked[eng.tuningId]) return {...eng, assignment:'idle', tuningId:null, xp:(eng.xp||0)+30};
      const pts = (eng.level||1) * 1.5;
      tuningResearch[eng.tuningId] = (tuningResearch[eng.tuningId]||0) + pts;
      const tl = TUNING_LEVELS.find(t=>t.id===eng.tuningId);
      if (tl && tuningResearch[eng.tuningId] >= tl.researchCost) {
        tuningUnlocked[eng.tuningId] = true;
        _newTuningUnlock = eng.tuningId;
        return {...eng, assignment:'idle', tuningId:null, xp:(eng.xp||0)+30};
      }
      return {...eng, xp:(eng.xp||0)+0.05};
    }
    // Blueprint research
    if (eng.assignment !== 'research' || !eng.blueprintId) return eng;
    const bp = BLUEPRINTS.find(b=>b.id===eng.blueprintId);
    if (!bp || (gs.blueprints||{})[bp.id]) return {...eng, assignment:'idle', blueprintId:null};
    const pointsPerTick = eng.level || 1;
    const newProg = (eng.researchProgress||0) + pointsPerTick;
    if (newProg >= bp.researchCost) {
      return {...eng, assignment:'idle', blueprintId:null, researchProgress:0, xp:(eng.xp||0)+50};
    }
    return {...eng, researchProgress:newProg, xp:(eng.xp||0)+0.1};
  });
  // Check for newly completed blueprints
  const completedBp = (gs.engineers||[]).find(eng => {
    if (eng.assignment !== 'research' || !eng.blueprintId) return false;
    const bp = BLUEPRINTS.find(b=>b.id===eng.blueprintId);
    return bp && (eng.researchProgress||0) + (eng.level||1) * ((ENGINEER_POOL.find(p=>p.id===eng.engId)||{}).researchSpeed||1) >= bp.researchCost;
  });
  let newBlueprints = {...(gs.blueprints||{})};
  let _completedBlueprint = null;
  if (completedBp) {
    newBlueprints[completedBp.blueprintId] = true;
    _completedBlueprint = completedBp.blueprintId;
  }
  // Engineer level-up (every 100 xp)
  engineers = engineers.map(eng => {
    const xp = eng.xp||0;
    const newLevel = Math.min(5, Math.floor(xp/100)+1);
    return newLevel !== eng.level ? {...eng, level:newLevel} : eng;
  });

  return { ...gs, ...extra, lines:newLines, parked, totalBuilt, contracts, garage, seasonChallenge:seasonCh, lastTickMs:Date.now(), engineers, blueprints:newBlueprints, _completedBlueprint, tuningResearch, tuningUnlocked, _newTuningUnlock };
}

// ─── Wiederverwendbares zusammenklappbares Panel ───
// Spart Platz im UI, Nutzer kann selbst entscheiden was offen ist.
// ── CAR BUILD SVG — Auto wird schrittweise zusammengebaut
// stages: 0=Chassis, 1=+Räder, 2=+Karosserie, 3=+Lack, 4=+Glas, 5=Komplett
// ═══════════════════════════════════════════════
// SOUND SYSTEM — Web Audio API (no external files)
// ═══════════════════════════════════════════════
const SoundSystem = (() => {
  let ctx = null;
  let enabled = true;
  let masterVol = 0.3;

  const getCtx = () => {
    if (!ctx && typeof window !== 'undefined' && window.AudioContext) {
      try { ctx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch(e) { return null; }
    }
    return ctx;
  };

  const playTone = (freq, duration, type='sine', volume=1) => {
    if (!enabled) return;
    const c = getCtx();
    if (!c) return;
    try {
      const osc = c.createOscillator();
      const gain = c.createGain();
      osc.connect(gain);
      gain.connect(c.destination);
      osc.type = type;
      osc.frequency.setValueAtTime(freq, c.currentTime);
      gain.gain.setValueAtTime(volume * masterVol, c.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + duration);
      osc.start(c.currentTime);
      osc.stop(c.currentTime + duration);
    } catch(e) { /* ignore */ }
  };

  const playSweep = (startFreq, endFreq, duration, type='sine', volume=1) => {
    if (!enabled) return;
    const c = getCtx();
    if (!c) return;
    try {
      const osc = c.createOscillator();
      const gain = c.createGain();
      osc.connect(gain);
      gain.connect(c.destination);
      osc.type = type;
      osc.frequency.setValueAtTime(startFreq, c.currentTime);
      osc.frequency.exponentialRampToValueAtTime(endFreq, c.currentTime + duration);
      gain.gain.setValueAtTime(volume * masterVol, c.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + duration);
      osc.start(c.currentTime);
      osc.stop(c.currentTime + duration);
    } catch(e) { /* ignore */ }
  };

  return {
    tap:       () => playTone(800, 0.05, 'square', 0.3),           // kurzer hoher Click
    sell:      () => { playSweep(400, 800, 0.15, 'sine', 0.6); setTimeout(()=>playTone(1200, 0.1, 'sine', 0.5), 80); }, // Cha-Ching
    coin:      () => playTone(1400, 0.08, 'sine', 0.4),            // kurzes hohes Ting
    build:     () => playTone(300, 0.08, 'triangle', 0.3),          // dumpfer Hammerschlag
    complete:  () => { playSweep(600, 1200, 0.2, 'sine', 0.6); },  // Auto fertig
    levelUp:   () => { [0, 100, 200].forEach((d,i) => setTimeout(() => playTone(500+i*200, 0.15, 'sine', 0.5), d)); }, // Triadic
    achievement:() => { [0, 80, 160, 240].forEach((d,i) => setTimeout(() => playTone([523, 659, 784, 1047][i], 0.2, 'sine', 0.5), d)); }, // C-E-G-C
    error:     () => playTone(200, 0.2, 'sawtooth', 0.4),          // tiefer Fehlerton
    prestige:  () => { [0, 150, 300, 450].forEach((d,i) => setTimeout(() => playSweep(400+i*200, 800+i*200, 0.25, 'sine', 0.6), d)); }, // Aufsteigende Fanfare
    setEnabled:(v) => { enabled = v; },
    isEnabled: () => enabled,
    setVolume: (v) => { masterVol = Math.max(0, Math.min(1, v)); },
    getVolume: () => masterVol,
    resume:    () => { const c=getCtx(); if(c&&c.state==='suspended') c.resume(); },
  };
})();

  // -- Save system ---------------------------------------------
  const [isLoading, setIsLoading]   = useState(true);  // true while checking storage
  const [saveStatus, setSaveStatus] = useState('idle');
  const [resetConfirm, setResetConfirm] = useState(false); // 'idle'|'saving'|'saved'|'error'
  const saveTimer = useRef(null);
  const SAVE_KEY  = 'autofactory_save_v1';

  // Merge loaded save with current defaults (handles new fields from updates)
  const migrateSave = (saved) => {
    const fresh = initGS();
    // Migration: Alte Saves hatten salesmanLvl:1 als Startwert, aber jetzt muss man
    // den Azubi erst kaufen (150k€). Wenn der Spieler noch nicht mal die Azubi-Kosten
    // verdient hat (150k€ × 2 = 300k als Sicherheitspuffer), war's ein Default-Geschenk.
    let migratedSalesman = saved.salesmanLvl;
    if (migratedSalesman === 1 && (!saved.totalEarned || saved.totalEarned < 300000) && !saved.prestigeCount) {
      migratedSalesman = 0;
      console.log('[Migration] Azubi zurückgesetzt — neue Spielmechanik');
    }
    // Migration: modelUpgrades waren früher 0-5, jetzt 0-3. Auf 3 clippen.
    const migratedUpgrades = {};
    Object.entries(saved.modelUpgrades || {}).forEach(([id, lvl]) => {
      migratedUpgrades[id] = Math.min(lvl || 0, MODEL_UPGRADE_LEVELS);
    });
    return { ...fresh, ...saved,
      salesmanLvl:    migratedSalesman != null ? migratedSalesman : 0,
      engineers:   saved.engineers   || [],
      blueprints:  saved.blueprints  || {},
      tuningResearch: saved.tuningResearch || {sport:0,super:0,hyper:0},
      tuningUnlocked: saved.tuningUnlocked || {},
      modelUpgrades:  migratedUpgrades,
      unlockedModels: saved.unlockedModels || {polo:true},
      stationUpgrades:saved.stationUpgrades || {},
      dailyStats:      saved.dailyStats      || { income:0, wages:0, engSalary:0, orderBonus:0 },
      financeHistory:  saved.financeHistory  || [],
      achievements:   saved.achievements   || {},
      techs:          saved.techs          || {},
      totalEarned:    saved.totalEarned    || 0,
      totalOrders:    saved.totalOrders    || 0,
      totalTaps:      saved.totalTaps      || 0,
      tunedCount:     saved.tunedCount     || 0,
      prestigeCount:  saved.prestigeCount  || 0,
      garage:         saved.garage         || [],
      weekMarket:     saved.weekMarket     || null,
      lineSpecs:      saved.lineSpecs      || {},
      prestigeBoni:   saved.prestigeBoni   || [],
      reputation:     saved.reputation     || 0,
      streak:         saved.streak         || 0,
      loginStreak:    saved.loginStreak    || 0,
      lastLoginDay:   saved.lastLoginDay   || 0,
      lastLoginTimestamp: saved.lastLoginTimestamp || 0,
      loginClaimed:   saved.loginClaimed   || {},
      tutorialSeen:   saved.tutorialSeen === true, // Explizit boolean — bleibt true wenn schonmal gesehen
      soundEnabled:   saved.soundEnabled !== false, // default true
      dailyMissions:  saved.dailyMissions  || [],
      missionsDay:    saved.missionsDay    || 0,
      totalSoldSession:   saved.totalSoldSession   || 0,
      totalEarnedSession: saved.totalEarnedSession || 0,
    };
  };

  // Load on mount
  useEffect(() => {
    try {
        const raw = localStorage.getItem(SAVE_KEY);
        const result = raw ? { value: raw } : null;
        if (result && result.value) {
          const saved = JSON.parse(result.value);
          setGS(migrateSave(saved));
          setSaveStatus('saved');
        }
    } catch(e) {
        console.log('No save found, starting fresh:', e);
      }
      setIsLoading(false);
  }, []);

  // Auto-save every 15 seconds when gs changes
  const saveNow = (state) => {
    setSaveStatus('saving');
    try {
      const toSave = {...(state||gs)};
      delete toSave._completedBlueprint;
      delete toSave._newTuningUnlock;
      delete toSave._pendingEventId;
      localStorage.setItem(SAVE_KEY, JSON.stringify(toSave));
      setSaveStatus('saved');
      setTimeout(()=>setSaveStatus('idle'), 2000);
    } catch(e) {
      setSaveStatus('error');
      console.error('Save failed:', e);
    }
  };

  const deleteSave = () => {
    try {
      // FIX: Kill pending auto-save BEFORE state change to avoid stale save
      clearTimeout(saveTimer.current);
      saveTimer.current = null;
      // Clear storage
      localStorage.removeItem(SAVE_KEY);
      // Reset state to fresh
      const fresh = initGS();
      setGS(fresh);
      setSaveStatus('idle');
      // FIX: Ensure fresh state gets written (not old state from closure)
      setTimeout(() => {
        try {
          localStorage.setItem(SAVE_KEY, JSON.stringify(fresh));
        } catch(e) {}
      }, 100);
      notify('🗑️ Spielstand gelöscht — Neustart!');
    } catch(e) {
      notify('❌ Löschen fehlgeschlagen');
      console.error(e);
    }
  };

  // Trigger auto-save on gs changes (debounced)

  const notifT       = useRef(null);
  const prevEventId  = useRef(null);
  const eventBannerT = useRef(null);
  const coinId    = useRef(0);
  const cheatTaps = useRef(0);
  useEffect(() => {
    if (isLoading) return; // don't save while loading
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => saveNow(gs), 15000);
    return () => clearTimeout(saveTimer.current);
  }, [gs, isLoading]);

  // Save on tab change (ensure progress not lost)
  const switchTab = (t) => {
    setTab(t);
    if (!isLoading) saveNow(gs);
  };

  // -- Unified notification queue ------------------------------
  const cheatTimer= useRef(null);

  const handleCheatTap = () => {
    cheatTaps.current++;
    clearTimeout(cheatTimer.current);

              , React.createElement('div', { style: { background:"#1a1a1a",borderRadius:14,padding:"12px 14px" },}

                  React.createElement('div', { key: k, style: { display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px solid #222" },}
                    , React.createElement('span', { style: { fontSize:10,color:"#555" },}, k)
                    , React.createElement('span', { style: { fontSize:10,color:"#aaa",fontWeight:700 },}, v)
                  )
                ))

            )

        )
      )

  );
