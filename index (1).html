// Generiere 3 tägliche Missionen basierend auf gameDay + cityIdx
function genDailyMissions(gameDay, cityIdx) {
  const seed = gameDay * 31 + cityIdx * 7;
  const pool = [...DAILY_MISSION_POOL];
  const chosen = [];
  let s = seed;
  while (chosen.length < 3 && pool.length > 0) {
    s = (s * 1664525 + 1013904223) & 0x7fffffff;
    const idx = s % pool.length;
    chosen.push({...pool[idx], current:0, claimed:false});
    pool.splice(idx, 1);
  }
  return chosen;
}

// Build flat tree with depth for each category
function flattenTree(cat) {
  const nodes = TECH_TREE.filter(t => t.cat === cat);
  const result = [];
  function walk(reqId, depth) {
    nodes.filter(n => (n.req||null) === reqId).forEach(n => {
      result.push({ ...n, depth });
      walk(n.id, depth + 1);
    });
  }
  walk(null, 0);
  return result;
}

let _cid = 1;
function getModelUpgradeMult(modelId, modelUpgrades) {
  const lvl = (modelUpgrades||{})[modelId]||0;
  return 1.0 + lvl * 0.20;
}

function genContract(ci, isVip, unlockedModels, vipMult) {
  const allMs = CITY_MODELS[cl(ci,0,CITY_MODELS.length-1)];
  // Only offer contracts for models the player has unlocked
  const ms = unlockedModels
    ? allMs.filter(m=>unlockedModels[m.id])
    : allMs.slice(0,1); // fallback: only slot-0
  const pool = ms.length > 0 ? ms : allMs.slice(0,1);
  const m  = pool[Math.floor(Math.random()*pool.length)];
  const q  = isVip ? 1 + Math.floor(Math.random()*2) : 2 + Math.floor(Math.random()*4);
  const vipM = vipMult||1.0;
  const mult = isVip ? (3.0+Math.random()*1.5)*vipM : (1.3+Math.random()*0.5);
  return {
    id:_cid++, modelId:m.id, emoji:m.emoji, name:m.name,
    qty:q, filled:0,
    reward:Math.round(m.val*q*mult),
    ticksLeft: isVip ? 250+q*80 : 600+q*150,
    isVip: isVip||false,
  };
}

function getSpeedMult(techs) {

  if (techs.lean)          m *= 0.80;
  if (techs.assembly)      m *= 0.90;
  if (techs.printing3d)    m *= 0.85;
  if (techs.carbon_fiber)  m *= 0.82;
  if (techs.nachtschicht)  m *= 0.80;
  if (techs.turbolader)    m *= 0.85;
  if (techs.globalsupply)  m *= 0.88;
  if (techs.ki_vision)     m *= 0.92;
  if (techs.lean_kanban)   m *= 0.90;
  if (techs.supply_chain_ai) m *= 0.75;

  if      (techs.quantenwerk)   m = 8.0;
  else if (techs.smartfactory)  m = 6.0;
  else if (techs.robotultimate) m = 5.0;
  else if (techs.robot2)        m = 3.0;
  else if (lineId===1 && techs.robot1) m = 2.0;
  // Gigafabrik bonus
  if (techs.gigafabrik) m *= 1.5;
  // Line specialization
  if ((lineSpecs||{})[lineId]==="speed") m *= 1.30;
  return m;
}

function getLineValBonus(lineId, lineSpecs) {
  return (lineSpecs||{})[lineId]==="quality" ? 0.30 : 0.0;
}

function getShowroomMax(techs, lineSpecs) {
  let m = 24;
  if (techs.showroom_ext) m += 8;
  if (techs.showroom_vip) m += 12;
  if (techs.werksschutz)  m += 6;
  Object.values(lineSpecs||{}).forEach(s=>{ if(s==="volume") m+=4; });
  return m;
}

function tickLine(line, activeSts, model, techs, lineSpecs) {
  if (!line.unlocked || line.workers===0) return line;
  const spd   = getSpeedMult(techs);
  const weff  = getWorkerEffMult(techs);
  const lmult = getLineSpdMult(line.id, techs, lineSpecs);
  const delta = (line.workers * weff * lmult * spd) / model.ticks;
  const si    = line.stIdx;
  if (si >= activeSts.length) return { ...line, ready:true, stIdx:0, prog:0 };
  const np = line.prog + delta;
  if (np >= 1.0) return { ...line, stIdx:si+1, prog:0 };
  return { ...line, prog:np };
}

function makeLines() {
  return Array.from({ length:MAX_LINES }, (_,i) => ({
    id:i, unlocked:i===0, modelId:'polo', workers:i===0?1:0, stIdx:0, prog:0, ready:false,
  }));
}

function tickGS(gs) {
  const ci       = cl(gs.cityIdx, 0, CITIES.length-1);
  const activeSts= STATIONS.filter(s => s.city <= ci);
  const models   = CITY_MODELS[ci];
  const maxL     = CITIES[ci].maxLines;
  const lineSpecs= gs.lineSpecs || {};
  const pb       = gs.prestigeBonuses || {speed:0,value:0,wage:0};

  // Event modifiers
  const ev       = gs.activeEvent;
  const evSpeed  = ev && ev.effect==="speed+20" ? 0.80 : (ev && ev.effect==="speed-30"||ev?.effect==="shortage") ? 1.50 : 1.0;
  const evVal    = ev && ev.effect==="value+40" ? 1.40 : ev && ev.effect==="boom" ? 1.80 : 1.0;
  const evWage   = ev && ev.effect==="wage+100"  ? 2.0  : 1.0;

  const valMult      = getValMult(gs.techs) * evVal * (1 + (pb.value||0)/100);
  const maxContracts = getMaxContracts(gs.techs);
  const showroomMax  = getShowroomMax(gs.techs, lineSpecs);
  const wageMult     = getWageMult(gs.techs) * evWage * (1 - (pb.wage||0)/100);
  const dailyBonus   = getDailyBonus(gs.techs);

  // Event countdown — BUG FIX: clear _newEventFlag immediately
  let eventTicksLeft = (gs.eventTicksLeft||0) > 0 ? gs.eventTicksLeft-1 : 0;
  let activeEvent    = eventTicksLeft > 0 ? gs.activeEvent : null;

  // BUG FIX: streak resets when a contract expires
  const prevContractIds = new Set(gs.contracts.map(c=>c.id));
  let contracts = gs.contracts.map(c=>({...c,ticksLeft:c.ticksLeft-1})).filter(c=>c.ticksLeft>0);
  const expiredCount = gs.contracts.length - contracts.length;
  let streak = gs.streak || 0;
  if (expiredCount > 0) streak = 0; // BUG FIX: streak reset

  let dayTick = gs.dayTick + 1;
  let extra   = { dayTick, eventTicksLeft, activeEvent, streak };

  if (dayTick >= TICKS_DAY) {
    const engSalary = (gs.engineers||[]).reduce((s,e)=>{
      const eng = ENGINEER_POOL.find(p=>p.id===e.engId);
      return s + (eng ? eng.baseSalary * e.level : 0);
    }, 0);
    const wc = Math.round(gs.totalWorkers * 500 * wageMult) + engSalary - dailyBonus;
    while (contracts.length < maxContracts) contracts = [...contracts, genContract(ci, false, gs.unlockedModels, 1.0)];

    // New event (30% chance, no _newEventFlag bug)
    let newEvent = activeEvent, newEvTicks = eventTicksLeft, newEvId = null;
    if (!activeEvent && Math.random() < 0.30) {
      newEvent   = DAILY_EVENTS[Math.floor(Math.random()*DAILY_EVENTS.length)];
      newEvTicks = TICKS_DAY * 2;
      newEvId    = newEvent.id;
    }

    // Week market (every 7 days)
    let weekMarket = gs.weekMarket;
    if (gs.gameDay % 7 === 0 && (!weekMarket || weekMarket.dayOpened !== gs.gameDay)) {
      const pool = [...MARKET_POOL].sort(()=>Math.random()-0.5).slice(0,3);
      weekMarket = { offers:pool, dayOpened:gs.gameDay, bought:[] };
    }

    // Season challenge progress
    let seasonChallenge = gs.seasonChallenge;
    if (!seasonChallenge) {
      const tmpl = SEASON_TEMPLATES[Math.floor(Math.random()*SEASON_TEMPLATES.length)];
      seasonChallenge = { ...tmpl, current:0, dayEnd:gs.gameDay+30 };
    }

    extra = {
      money:Math.max(0, gs.money - wc), gameDay:gs.gameDay+1, dayTick:0,
      activeEvent:newEvent, eventTicksLeft:newEvTicks,
      _pendingEventId: newEvId,   // component reads this, then clears
      streak, weekMarket, seasonChallenge,
    };
  }

  const line1Stopped = ev && ev.effect==="line1stop";
  let parked     = [...gs.parked];
  let totalBuilt = gs.totalBuilt;
  let garage     = { ...(gs.garage||{}) };
  let seasonCh   = extra.seasonChallenge || gs.seasonChallenge;

  const newLines = gs.lines.map(line => {
    if (!line.unlocked || line.id >= maxL) return line;
    if (line1Stopped && line.id === 0) return line;
    const m0    = ALL_MODELS.find(m=>m.id===line.modelId) || models[0];
    const lsVal = getLineValBonus(line.id, lineSpecs);
    const model = { ...m0, ticks: Math.round(m0.ticks * evSpeed) };
    const t     = tickLine(line, activeSts, model, gs.techs, lineSpecs);
    if (t.ready && !line.ready) {
      if (parked.length < showroomMax) {
        const upgMult = getModelUpgradeMult(m0.id, gs.modelUpgrades);
        const carVal = Math.round(m0.val * valMult * (1+lsVal) * upgMult);
        parked = [...parked, { id:uid(), modelId:m0.id, emoji:m0.emoji, name:m0.name, val:carVal, tuned:0 }];
        garage[m0.id] = (garage[m0.id]||0) + 1;
        totalBuilt++;
        // Season build progress
        if (seasonCh && seasonCh.type==="build") seasonCh = {...seasonCh, current:(seasonCh.current||0)+1};
      }
      return { ...t, ready:false };
    }
    return t;
  });

  // ── Tuning research tick ──
  let tuningResearch = {...(gs.tuningResearch||{sport:0,super:0,hyper:0})};
  let tuningUnlocked = {...(gs.tuningUnlocked||{})};
  let _newTuningUnlock = null;
  // Also handle engineer blueprint research + tuning in one map
  let engineers = (gs.engineers||[]).map(eng => {
    // Tuning research
    if (eng.assignment === 'tuning' && eng.tuningId) {
      if (tuningUnlocked[eng.tuningId]) return {...eng, assignment:'idle', tuningId:null, xp:(eng.xp||0)+30};
      const pts = (eng.level||1) * 1.5;
      tuningResearch[eng.tuningId] = (tuningResearch[eng.tuningId]||0) + pts;
      const tl = TUNING_LEVELS.find(t=>t.id===eng.tuningId);
      if (tl && tuningResearch[eng.tuningId] >= tl.researchCost) {
        tuningUnlocked[eng.tuningId] = true;
        _newTuningUnlock = eng.tuningId;
        return {...eng, assignment:'idle', tuningId:null, xp:(eng.xp||0)+30};
      }
      return {...eng, xp:(eng.xp||0)+0.05};
    }
    // Blueprint research
    if (eng.assignment !== 'research' || !eng.blueprintId) return eng;
    const bp = BLUEPRINTS.find(b=>b.id===eng.blueprintId);
    if (!bp || (gs.blueprints||{})[bp.id]) return {...eng, assignment:'idle', blueprintId:null};
    const pointsPerTick = eng.level || 1;
    const newProg = (eng.researchProgress||0) + pointsPerTick;
    if (newProg >= bp.researchCost) {
      return {...eng, assignment:'idle', blueprintId:null, researchProgress:0, xp:(eng.xp||0)+50};
    }
    return {...eng, researchProgress:newProg, xp:(eng.xp||0)+0.1};
  });
  // Check for newly completed blueprints
  const completedBp = (gs.engineers||[]).find(eng => {
    if (eng.assignment !== 'research' || !eng.blueprintId) return false;
    const bp = BLUEPRINTS.find(b=>b.id===eng.blueprintId);
    return bp && (eng.researchProgress||0) + (eng.level||1) >= bp.researchCost;
  });
  let newBlueprints = {...(gs.blueprints||{})};
  let _completedBlueprint = null;
  if (completedBp) {
    newBlueprints[completedBp.blueprintId] = true;
    _completedBlueprint = completedBp.blueprintId;
  }
  // Engineer level-up (every 100 xp)
  engineers = engineers.map(eng => {
    const xp = eng.xp||0;
    const newLevel = Math.min(5, Math.floor(xp/100)+1);
    return newLevel !== eng.level ? {...eng, level:newLevel} : eng;
  });

  return { ...gs, ...extra, lines:newLines, parked, totalBuilt, contracts, garage, seasonChallenge:seasonCh, lastTickMs:Date.now(), engineers, blueprints:newBlueprints, _completedBlueprint, tuningResearch, tuningUnlocked, _newTuningUnlock };
}

function initGS() {
  return {
    money:8000, cityIdx:0, totalBuilt:0, totalSold:0,
    totalWorkers:3, salesmanLvl:0, gameDay:1, dayTick:0,
    parked:[], contracts:[genContract(0, false, {polo:true})], techs:{},
    lines:makeLines(),
    reputation:0, streak:0, tunedCount:0,
    achievements:{}, activeEvent:null, eventTicksLeft:0,
    // NEW v18
    lineSpecs:{},                   // {lineId: 'speed'|'quality'|'volume'|null}
    prestigeCount:0,                // times prestiged
    prestigeBonuses:{speed:0,value:0,wage:0}, // permanent %
    garage:{},                      // {modelId: totalBuilt}
    weekMarket:null,                // {offers:[], dayOpened:N}
    seasonChallenge:null,           // {icon,goal,type,target,current,reward,dayEnd}
    totalEarned:0,                  // lifetime earnings (for challenges)
    totalOrders:0,                  // lifetime orders completed
    lastTickMs: Date.now(),         // for offline progress
    marketDiscount:1.0,             // next tech discount from market
    hireDiscount:false,             // free hire from market
    unlockedModels:{polo:true},
    modelUpgrades:{polo:0},
    totalTaps:0,
    // Engineers
    engineers:[],
    tuningResearch:{sport:0,super:0,hyper:0},
    tuningUnlocked:{},
    blueprints:{},
    engSlots:1,
    // Login + Missions
    loginStreak:0,           // consecutive days logged in
    lastLoginDay:0,          // gameDay of last login claim
    loginClaimed:{},         // {day1..7: true}
    dailyMissions:[],        // [{...mission, current, claimed}]
    missionsDay:0,           // which gameDay missions were generated
    totalSoldSession:0,      // session sell counter for missions
    totalEarnedSession:0,    // session earn counter for missions
  };
}

// ═══ COMPONENT ════════════════════════════════════════════════
function AutoFactory() {
  const [gs, setGS]           = useState(initGS);
  const [tab, setTab]         = useState("fabrik");
  const [showMap, setShowMap] = useState(false);
  const [showPre, setShowPre] = useState(false);
  const [showMarket, setShowMarket]   = useState(false);
  const [showUnlockPanel, setShowUnlockPanel] = useState(null);
  const [showPresBonus, setShowPresBonus] = useState(false);
  const [sheet, setSheet] = useState(null);
  const [modal, setModal] = useState(null);
  const openSheet = (type, data={}) => setSheet({type, data});
  const closeSheet = () => setSheet(null);
  const openModal = (type, data={}) => setModal({type, data});
  const closeModal = () => setModal(null);
  const [showEventBanner, setShowEventBanner] = useState(false);
  const [tapFlashes, setTapFlashes] = useState({});
  const [coins, setCoins]     = useState([]);
  const [cheatMode, setCheatMode] = useState(false);
  const [showAdmin, setShowAdmin] = useState(false);
  const [adminSpeed, setAdminSpeed] = useState(1);
  const [tuningCar, setTuningCar] = useState(null);
  const [showLogin, setShowLogin] = useState(false); // login bonus modal

  // ── Save system ─────────────────────────────────────────────
  const [isLoading, setIsLoading]   = useState(true);  // true while checking storage
  const [saveStatus, setSaveStatus] = useState('idle'); // 'idle'|'saving'|'saved'|'error'
  const saveTimer = useRef(null);
  const SAVE_KEY  = 'autofactory_save_v1';

  // Merge loaded save with current defaults (handles new fields from updates)
  const migrateSave = (saved) => {
    const fresh = initGS();
    return { ...fresh, ...saved,
      engineers:   saved.engineers   || [],
      blueprints:  saved.blueprints  || {},
      tuningResearch: saved.tuningResearch || {sport:0,super:0,hyper:0},
      tuningUnlocked: saved.tuningUnlocked || {},
      modelUpgrades:  saved.modelUpgrades  || {},
      unlockedModels: saved.unlockedModels || {polo:true},
      achievements:   saved.achievements   || {},
      techs:          saved.techs          || {},
      totalEarned:    saved.totalEarned    || 0,
      totalOrders:    saved.totalOrders    || 0,
      totalTaps:      saved.totalTaps      || 0,
      tunedCount:     saved.tunedCount     || 0,
      prestigeCount:  saved.prestigeCount  || 0,
      garage:         saved.garage         || [],
      weekMarket:     saved.weekMarket     || null,
      lineSpecs:      saved.lineSpecs      || {},
      prestigeBoni:   saved.prestigeBoni   || [],
      reputation:     saved.reputation     || 0,
      streak:         saved.streak         || 0,
      loginStreak:    saved.loginStreak    || 0,
      lastLoginDay:   saved.lastLoginDay   || 0,
      loginClaimed:   saved.loginClaimed   || {},
      dailyMissions:  saved.dailyMissions  || [],
      missionsDay:    saved.missionsDay    || 0,
      totalSoldSession:   saved.totalSoldSession   || 0,
      totalEarnedSession: saved.totalEarnedSession || 0,
    };
  };

  // Load on mount
  useEffect(() => {
    try {
        const raw = localStorage.getItem(SAVE_KEY);
        const result = raw ? { value: raw } : null;
        if (result && result.value) {
          const saved = JSON.parse(result.value);
          setGS(migrateSave(saved));
          setSaveStatus('saved');
        }
    } catch(e) {
        console.log('No save found, starting fresh:', e);
      }
      setIsLoading(false);
  }, []);

  // Auto-save every 15 seconds when gs changes
  const saveNow = (state) => {
    setSaveStatus('saving');
    try {
      const toSave = {...(state||gs)};
      delete toSave._completedBlueprint;
      delete toSave._newTuningUnlock;
      delete toSave._pendingEventId;
      localStorage.setItem(SAVE_KEY, JSON.stringify(toSave));
      setSaveStatus('saved');
      setTimeout(()=>setSaveStatus('idle'), 2000);
    } catch(e) {
      setSaveStatus('error');
      console.error('Save failed:', e);
    }
  };

  const deleteSave = () => {
    try {
      localStorage.removeItem(SAVE_KEY);
      setGS(initGS());
      setSaveStatus('idle');
      notify('🗑️ Spielstand gelöscht — Neustart!');
    } catch(e) {
      notify('❌ Löschen fehlgeschlagen');
    }
  };

  // Trigger auto-save on gs changes (debounced)
  useEffect(() => {
    if (isLoading) return; // don't save while loading
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => saveNow(gs), 15000);
    return () => clearTimeout(saveTimer.current);
  }, [gs, isLoading]);

  // Save on tab change (ensure progress not lost)
  const switchTab = (t) => {
    setTab(t);
    if (!isLoading) saveNow(gs);
  };

  // ── Unified notification queue ──────────────────────────────
  const [activeNotif, setActiveNotif] = useState(null);
  const notifQueue   = useRef([]);
  const notifActive  = useRef(false);
  const notifT       = useRef(null);
  const prevEventId  = useRef(null);
  const eventBannerT = useRef(null);
  const coinId    = useRef(0);
  const cheatTaps = useRef(0);
  const cheatTimer= useRef(null);

  const handleCheatTap = () => {
    cheatTaps.current++;
    clearTimeout(cheatTimer.current);
    cheatTimer.current = setTimeout(() => { cheatTaps.current = 0; }, 2000);
    if (cheatTaps.current >= 5) {
      cheatTaps.current = 0;
      setShowAdmin(true);
    }
  };

  // Login bonus — check on load
  useEffect(()=>{
    if(isLoading) return;
    // Show login modal if new day
    if(gs.lastLoginDay < gs.gameDay) setShowLogin(true);
    // Generate missions if new day
    if(gs.missionsDay !== gs.gameDay) {
      setGS(p=>({...p,
        dailyMissions: genDailyMissions(p.gameDay, p.cityIdx),
        missionsDay: p.gameDay,
        totalSoldSession:0,
        totalEarnedSession:0,
      }));
    }
  }, [isLoading]);

  // Claim login reward
  const claimLoginReward = (reward) => {
    const slotIdx = ((gs.loginStreak||0) % 7); // which day slot (0-6)
    setGS(p => {
      let upd = {...p,
        lastLoginDay: p.gameDay,
        loginStreak: (p.loginStreak||0)+1,
        loginClaimed: {...(p.loginClaimed||{}), [slotIdx]: true},
      };
      if (reward.type==='money')      upd.money = p.money + reward.val;
      if (reward.type==='worker')     upd.totalWorkers = p.totalWorkers + reward.val;
      if (reward.type==='cars') {
        const m = CITY_MODELS[p.cityIdx][0];
        const newCars = Array.from({length:reward.val},()=>({id:uid(),modelId:m.id,emoji:m.emoji,name:m.name,val:m.val,tuned:0,appliedTuning:[]}));
        upd.parked = [...p.parked, ...newCars].slice(0, 30);
      }
      if (reward.type==='techDisc')   upd.marketDiscount = reward.val;
      if (reward.type==='speedBoost') upd._speedBoostEnd = Date.now() + 300000; // 5 min
      return upd;
    });
    setShowLogin(false);
    notifQueuePush({type:'toast', msg:`${reward.icon} Login-Bonus: ${reward.label}!`});
  };

  // Mission progress tracker — update on key events
  const updateMissions = (type, amount) => {
    setGS(p=>{
      const ms=(p.dailyMissions||[]).map(m=>{
        if(m.claimed) return m;
        let cur=m.current||0;
        if(m.type===type){
          if(type==='streak') cur=Math.max(cur,amount);
          else if(type==='rep') cur=Math.max(cur,amount);
          else cur+=amount;
        }
        return {...m,current:Math.min(cur,m.target)};
      });
      return {...p,dailyMissions:ms};
    });
  };

  // Claim mission reward
  const claimMission = (mIdx) => {
    const m = gs.dailyMissions[mIdx];
    if(!m||m.claimed||m.current<m.target) return;
    const reward = MISSION_REWARDS[mIdx]||5000;
    setGS(p=>({...p,
      money:p.money+reward,
      dailyMissions:p.dailyMissions.map((ms,i)=>i===mIdx?{...ms,claimed:true}:ms)
    }));
    notifQueuePush({type:'toast',msg:`✅ Mission abgeschlossen! +${fmtE(reward)}`});
  };


  useEffect(() => {
    const unlocked = ACHIEVEMENTS.filter(a => !gs.achievements[a.id] && a.check(gs));
    if (unlocked.length > 0) {
      const a = unlocked[0];
      setGS(p => {
        let upd = { ...p, achievements: { ...p.achievements, [a.id]: true } };
        if (a.reward?.type === 'money') upd.money = (p.money||0) + a.reward.val;
        if (a.reward?.type === 'rep')   upd.reputation = Math.min(100,(p.reputation||0)+a.reward.val);
        return upd;
      });
      // Queue achievement notif — reward toast follows after
      pushAch(a);
      if (a.reward?.type === 'money') notifQueuePush({type:'toast', msg:`🏅 Belohnung: +${fmtE(a.reward.val)}`});
    }
  }, [gs.totalBuilt, gs.totalSold, gs.cityIdx, gs.money, gs.reputation, gs.streak, gs.tunedCount, gs.lines, gs.achievements, gs.totalOrders, gs.modelUpgrades, gs.techs, gs.prestigeCount, gs.totalTaps]);

  // Tuning unlock notification
  const prevTuningRef = useRef({});
  useEffect(()=>{
    const tid = gs._newTuningUnlock;
    if(tid && !prevTuningRef.current[tid]) {
      prevTuningRef.current[tid] = true;
      const tl = TUNING_LEVELS.find(t=>t.id===tid);
      if(tl) notifQueuePush({type:'tuning', tl});
      setGS(p=>({...p, _newTuningUnlock:null}));
    }
  }, [gs._newTuningUnlock]);

  // Blueprint completion notification
  const prevBlueprintRef = useRef({});
  useEffect(()=>{
    const bpId = gs._completedBlueprint;
    if (bpId && bpId !== null && !prevBlueprintRef.current[bpId]) {
      prevBlueprintRef.current[bpId] = true;
      const bp = BLUEPRINTS.find(b=>b.id===bpId);
      if (bp) {
        notifQueuePush({type:'blueprint', bp});
        setGS(p=>({...p, _completedBlueprint:null,
          unlockedModels:{...p.unlockedModels, [bpId]:true}
        }));
      }
    }
  }, [gs._completedBlueprint]);

  // Engineer salary deducted daily (in tickGS via wageMult already covers workers;
  // engineers are extra — deduct from daily cycle)
  // Blueprint cars available in model picker: add to availModels

  useEffect(() => {
    const pid = gs._pendingEventId;
    if (pid && pid !== prevEventId.current) {
      prevEventId.current = pid;
      const ev = DAILY_EVENTS.find(e=>e.id===pid);
      if (ev) {
        notify(`${ev.icon} ${ev.name} — ${ev.desc}`);
        if (ev.effect==="cash500k") setGS(p=>({...p,money:p.money+500000}));
        if (ev.effect==="vip")      setGS(p=>({...p,contracts:[...p.contracts,genContract(cl(p.cityIdx,0,CITY_MODELS.length-1),true,p.unlockedModels,getVipPriceMult(p.techs))]}));
      }
      // Show banner briefly, then auto-hide
      setShowEventBanner(true);
      clearTimeout(eventBannerT.current);
      eventBannerT.current = setTimeout(() => setShowEventBanner(false), 4000);
      setGS(p=>({...p,_pendingEventId:null}));
    }
  }, [gs._pendingEventId]);

  // Week market popup
  useEffect(() => {
    if (gs.weekMarket && gs.weekMarket.dayOpened===gs.gameDay && !showMarket) {
      setShowMarket(true);
    }
  }, [gs.weekMarket]);

  // Season challenge completion check
  useEffect(() => {
    const sc = gs.seasonChallenge;
    if (sc && sc.current >= sc.target && !sc.claimed) {
      setGS(p=>({...p,money:p.money+sc.reward,seasonChallenge:{...sc,claimed:true}}));
      notify(`🏆 Challenge erfüllt! +${fmtE(sc.reward)}`);
    }
  }, [gs.seasonChallenge]);

  // Offline progress on mount
  useEffect(() => {
    const now = Date.now();
    const last = gs.lastTickMs || now;
    const elapsed = now - last;
    const missedMs = Math.min(elapsed, 8*3600*1000); // cap 8h
    if (missedMs > 30000) { // >30s offline
      const missedTicks = Math.floor(missedMs / TICK_MS * 0.6); // 60% efficiency
      if (missedTicks > 5) {
        let sim = {...gs};
        for (let i=0; i<Math.min(missedTicks,2000); i++) sim = tickGS(sim);
        const earned = sim.money - gs.money;

  useEffect(() => {

  useEffect(() => {

  // ── Unified notification queue ──────────────────────────────

  const notify = msg => notifQueuePush({ type:'toast', msg });

  const popCoin = () => { const id=coinId.current++; setCoins(c=>[...c,{id,x:25+Math.random()*50}]); setTimeout(()=>setCoins(c=>c.filter(x=>x.id!==id)),1000); };

  // Derived
  const ci      = cl(gs.cityIdx, 0, CITIES.length-1);

  const maxL    = city.maxLines;

  const totalEarned = gs.totalEarned||0;

  const canPre  = req && totalEarned>=req.money && gs.totalBuilt>=req.cars && allCityModelsUnlocked;
  const assignedW = gs.lines.filter(l=>l.id<maxL).reduce((s,l)=>s+(l.unlocked?l.workers:0),0);
  const freeW   = gs.totalWorkers - assignedW;

  const activeSts = STATIONS.filter(s=>s.city<=ci);
  const visLines  = gs.lines.filter(l=>l.id<maxL);
  const rep       = gs.reputation || 0;
  const repLabel  = rep>=80?"👑 Legende":rep>=40?"⭐ Stadtbekannt":"🔘 Unbekannt";

  const streakMult= gs.streak>=10?2.0:gs.streak>=5?1.5:1.0;
  const achCount  = Object.keys(gs.achievements||{}).length;

  // Handlers
  const sell = () => {
    if (!gs.parked.length) return;

    const pb  = gs.prestigeBonuses||{};
    const incMult = gs.activeEvent && gs.activeEvent.effect==="income+50" ? 1.5 : 1.0;
    const cm  = getContractMult(gs.techs) * streakMult;
    let bonus=0, filled=false, repGain=0, orders=0;
    const contracts = gs.contracts
      .map(c=>{ if(!filled&&c.modelId===car.modelId&&c.filled<c.qty){filled=true;repGain=c.isVip?5:1;return{...c,filled:c.filled+1};}return c; })
      .map(c=>{ if(c.filled>=c.qty&&!c.claimed){bonus+=Math.round(c.reward*cm);orders++;return{...c,claimed:true};}return c; })

      <div style={{ width:200,height:6,background:"#e0e0e0",borderRadius:99,overflow:"hidden",marginTop:16 }}>
        <div style={{ height:"100%",background:"#FF6B35",borderRadius:99,animation:"loadingBar 1.5s ease-in-out infinite" }}/>
      </div>
    </div>
  );

  return (
    <div style={{ background:"#EEF2F7", minHeight:"100vh", fontFamily:"'Nunito',sans-serif", maxWidth:430, margin:"0 auto", display:"flex", flexDirection:"column", }}>
      <style>{css}</style>


      {/* Coins */}
      {coins.map(c=>(
        <div key={c.id} style={{ position:"fixed", bottom:88, left:`${c.x}%`, fontSize:26, animation:"coinUp 1s ease-out forwards", zIndex:200, pointerEvents:"none" }}>💰</div>
      ))}

      {/* ── HUD ── */}
      <div style={{ position:"sticky",top:0,zIndex:50,background:"#fff",borderBottom:`2px solid ${city.accent}33`,paddingBottom:8,boxShadow:"0 3px 16px rgba(0,0,0,0.07)" }}>
        <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 14px 6px" }}>
          <div style={{ display:"flex",alignItems:"center",gap:8,cursor:"pointer",background:"#fff",borderRadius:99,padding:"7px 14px 7px 10px",boxShadow:"0 3px 0 #e0e0e0",border:"2px solid #e8e8e8" }} onClick={()=>setShowMap(true)}>
            <span style={{ fontSize:24,display:"inline-block" }}>{city.flag}</span>
            <div>
              <div style={{ fontSize:13,fontFamily:"'Fredoka One',cursive",color:"#333",lineHeight:1 }}>{city.name}</div>
              <div style={{ fontSize:9,color:"#888" }}>Stadt {ci+1}/{CITIES.length} · Roadmap</div>
            </div>
          </div>
          <div style={{ display:"flex",flexDirection:"column",alignItems:"flex-end",gap:2 }}>
            <div onClick={handleCheatTap} style={{ background:"#fff",borderRadius:18,padding:"8px 16px",boxShadow:`0 3px 0 ${city.accent}44`,border:`2px solid ${cheatMode?"#FF6B35":city.accent}33`,cursor:"pointer",position:"relative",userSelect:"none" }}>
              {cheatMode&&<div style={{ position:"absolute",top:-9,right:-9,background:"#FF6B35",color:"#fff",fontSize:9,fontWeight:900,borderRadius:20,padding:"3px 8px",animation:"bounce 0.8s ease infinite",cursor:"pointer" }} onClick={(e)=>{e.stopPropagation();setShowAdmin(true);}}>⚡×{adminSpeed}</div>}
              <div style={{ fontSize:9,color:"#aaa",letterSpacing:1 }}>KASSE</div>
              <div style={{ fontSize:21,fontWeight:900,color:"#222",fontFamily:"'Fredoka One',cursive" }}>{fmtE(gs.money)}</div>
            </div>
            {/* Save indicator */}
            <div onClick={()=>saveNow(gs)} style={{ fontSize:9,color:saveStatus==='saving'?"#FF9800":saveStatus==='saved'?"#4CAF50":saveStatus==='error'?"#E63946":"#ccc",fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",gap:3,padding:"2px 4px" }}>
              {saveStatus==='saving'?"💾 Speichern…":saveStatus==='saved'?"✅ Gespeichert":saveStatus==='error'?"❌ Fehler":"💾 Speichern"}
            </div>
          </div>
        </div>

        {/* Stats */}
        <div style={{ display:"flex",gap:5,padding:"0 14px 6px" }}>
          {[
            {ic:"🚗",v:gs.totalBuilt,l:"Gebaut",col:"#FF6B35"},
            {ic:"💰",v:gs.totalSold,l:"Verkauft",col:"#4CAF50"},
            {ic:"👷",v:`${freeW}/${gs.totalWorkers}`,l:"Frei",col:"#2196F3"},
            {ic:"🏭",v:`${visLines.filter(l=>l.unlocked).length}/${maxL}`,l:"Linien",col:"#9C27B0"},
            {ic:"📅",v:`T${gs.gameDay}`,l:"Tag",col:"#607D8B"},
          ].map(({ic,v,l,col})=>(
            <div key={l} style={{ flex:1,background:"#fff",borderRadius:14,padding:"5px 3px",textAlign:"center",border:"2px solid #ebebeb",boxShadow:"0 2px 0 #ebebeb" }}>
              <div style={{ fontSize:14 }}>{ic}</div>
              <div style={{ fontSize:10,fontWeight:900,color:col }}>{v}</div>
              <div style={{ fontSize:8,color:"#aaa" }}>{l}</div>
            </div>
          ))}
          {/* Reputation */}
          <div style={{ flex:1,background:rep>=80?"rgba(255,215,0,0.3)":"rgba(255,255,255,0.65)",borderRadius:14,padding:"5px 3px",textAlign:"center",border:`2px solid ${rep>=80?"#FFD700":"#ebebeb"}`,boxShadow:"0 2px 0 #ebebeb" }}>
            <div style={{ fontSize:12 }}>{rep>=80?"👑":rep>=40?"⭐":"🔘"}</div>
            <div style={{ fontSize:10,fontWeight:900,color:rep>=80?"#B8860B":"#888" }}>{rep}</div>
            <div style={{ fontSize:8,color:"#aaa" }}>Ruf</div>
          </div>
        </div>

        {/* Daily Missions strip */}
        {(gs.dailyMissions||[]).length>0&&(()=>{
          const ms=gs.dailyMissions;
          const done=ms.filter(m=>m.claimed).length;
          const ready=ms.filter(m=>!m.claimed&&m.current>=m.target).length;
          return (
            <div style={{ margin:"0 14px 6px",padding:"7px 12px",borderRadius:12,background:ready>0?"linear-gradient(90deg,#E8F5E9,#F1F8E9)":"rgba(255,255,255,0.5)",border:ready>0?"2px solid #4CAF5066":"2px solid transparent",display:"flex",alignItems:"center",gap:10,cursor:"pointer" }} onClick={()=>switchTab('missions')}>
              <div style={{ fontSize:14 }}>📋</div>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:10,fontWeight:900,color:ready>0?"#4CAF50":"#888" }}>
                  {ready>0?`${ready} Mission${ready>1?'en':''} abholbereit! 🎁`:`Tages-Missionen · ${done}/3 erledigt`}
                </div>
                <div style={{ display:"flex",gap:4,marginTop:3 }}>
                  {ms.map((m,i)=>(
                    <div key={i} style={{ flex:1,height:4,borderRadius:99,background:"#e0e0e0",overflow:"hidden" }}>
                      <div style={{ height:"100%",background:m.claimed?"#4CAF50":m.current>=m.target?"#FFD700":"#FF6B35",width:`${Math.round((m.current/m.target)*100)}%`,transition:"width .5s",borderRadius:99 }}/>
                    </div>
                  ))}
                </div>
              </div>
              {ready>0&&<div style={{ fontSize:18,animation:"bounce 1s ease infinite" }}>🎁</div>}
            </div>
          );
        })()}
        {gs.activeEvent&&showEventBanner&&(
          <div style={{ margin:"0 14px 6px",padding:"8px 12px",borderRadius:12,background:gs.activeEvent.type==="good"?"linear-gradient(90deg,#E8F5E9,#F1F8E9)":"linear-gradient(90deg,#FFF3E0,#FFF8E7)",border:`2px solid ${gs.activeEvent.type==="good"?"#4CAF5066":"#FF980066"}`,display:"flex",alignItems:"center",gap:8,animation:"evSlide .4s ease" }}>
            <span style={{ fontSize:22 }}>{gs.activeEvent.icon}</span>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:11,fontWeight:900,color:gs.activeEvent.type==="good"?"#4CAF50":"#FF9800" }}>{gs.activeEvent.name}</div>
              <div style={{ fontSize:10,color:"#888" }}>{gs.activeEvent.desc}</div>
            </div>
            <button onClick={()=>setShowEventBanner(false)} style={{ fontSize:14,background:"none",border:"none",cursor:"pointer",color:"#bbb",padding:"0 2px",lineHeight:1 }}>✕</button>
          </div>
        )}
        {/* Streak (no event) */}
        {!gs.activeEvent&&gs.streak>=5&&(
          <div style={{ margin:"0 14px 4px",padding:"6px 12px",borderRadius:10,background:"#FFF3E0",border:"2px solid #FF6B3544",display:"flex",alignItems:"center",gap:6 }}>
            <span style={{ fontSize:18,animation:"streakPulse 0.8s ease infinite" }}>🔥</span>
            <span style={{ fontSize:11,fontWeight:900,color:"#FF6B35" }}>Streak ×{gs.streak} — {streakMult}× Auftragsboni!</span>
          </div>
        )}

        {/* Prestige bar */}
        {req&&(
          <div style={{ padding:"0 14px 4px",display:"flex",alignItems:"center",gap:8 }}>
            <div style={{ flex:1,display:"flex",flexDirection:"column",gap:3 }}>
              <div style={{ display:"flex",alignItems:"center",gap:4 }}>
                <span style={{ fontSize:9 }}>💰</span>
                <div style={{ flex:1,height:5,background:"rgba(255,255,255,0.5)",borderRadius:99,overflow:"hidden" }}>
                  <div style={{ height:"100%",background:`linear-gradient(90deg,${city.accent},${city.accent}cc)`,borderRadius:99,width:`${cl(((gs.totalEarned||0)/req.money)*100,0,100)}%`,transition:"width .5s" }}/>
                </div>
                <span style={{ fontSize:8,color:"rgba(0,0,0,0.4)",minWidth:40,textAlign:"right" }}>{fmtE(gs.totalEarned||0)}</span>
              </div>
              <div style={{ display:"flex",alignItems:"center",gap:4 }}>
                <span style={{ fontSize:9 }}>🚗</span>
                <div style={{ flex:1,height:5,background:"rgba(255,255,255,0.5)",borderRadius:99,overflow:"hidden" }}>
                  <div style={{ height:"100%",background:"linear-gradient(90deg,#4CAF50,#66BB6A)",borderRadius:99,width:`${cl((gs.totalBuilt/req.cars)*100,0,100)}%`,transition:"width .5s" }}/>
                </div>
                <span style={{ fontSize:8,color:"rgba(0,0,0,0.4)",minWidth:40,textAlign:"right" }}>{gs.totalBuilt}/{req.cars}</span>
              </div>
              {/* Model unlock progress */}
              <div style={{ display:"flex",alignItems:"center",gap:4 }}>
                <span style={{ fontSize:9 }}>🔓</span>
                <div style={{ flex:1,display:"flex",gap:3 }}>
                  {(CITY_MODELS[ci]||[]).map((m,i)=>{
                    const unlocked=!!(gs.unlockedModels||{})[m.id];
                    return <div key={m.id} style={{ flex:1,height:5,borderRadius:99,background:unlocked?"#FF9800":"rgba(255,255,255,0.3)",transition:"background .4s" }}/>;
                  })}
                </div>
                <span style={{ fontSize:8,color:"rgba(0,0,0,0.4)",minWidth:40,textAlign:"right" }}>
                  {(CITY_MODELS[ci]||[]).filter(m=>(gs.unlockedModels||{})[m.id]).length}/{CITY_MODELS[ci]?.length||3} Modelle
                </span>
              </div>
            </div>
            <button onClick={()=>canPre?setShowPre(true):null}
              style={{ fontSize:10,fontWeight:800,padding:"4px 12px",borderRadius:20,border:"none",background:canPre?city.accent:"rgba(255,255,255,0.5)",color:canPre?"#fff":"#aaa",cursor:canPre?"pointer":"default",fontFamily:"'Nunito',sans-serif",boxShadow:canPre?`0 4px 0 ${city.accent}88`:"none",animation:canPre?"bounce 1.2s ease infinite":"none",whiteSpace:"nowrap" }}>
              {canPre?"✨ PRESTIGE!":!allCityModelsUnlocked?`🔓 Alle Modelle freischalten`:req.label}
            </button>
          </div>
        )}
        {!req&&<div style={{ fontSize:11,color:"#FFD700",textAlign:"center",fontWeight:800,padding:"4px 0" }}>🏆 Cyberspace — Endstufe erreicht!</div>}
      </div>

      {/* ── UNIFIED NOTIFICATION (one at a time, queued) ── */}
      {activeNotif&&(()=>{
        const n = activeNotif;
        if (n.type==='toast') return (
          <div key={n.msg} style={{ position:"fixed",top:150,left:"50%",transform:"translateX(-50%)",background:"#fff",borderRadius:20,padding:"10px 22px",fontSize:13,fontWeight:800,color:"#333",zIndex:600,whiteSpace:"nowrap",animation:"pop .4s ease",boxShadow:"0 8px 24px rgba(0,0,0,0.18)",border:"3px solid #FFD700",maxWidth:340,textAlign:"center" }}>
            {n.msg}
          </div>
        );
        if (n.type==='ach') {
          const a=n.ach;
          const tierLabel=["🔍 GEHEIM","🥉 BRONZE","🥈 SILBER","🥇 GOLD","💎 PLATIN"][a.tier||0];
          return (
            <div key={a.id} style={{ position:"fixed",top:150,left:"50%",transform:"translateX(-50%)",background:"linear-gradient(135deg,#1a1a2e,#16213e)",borderRadius:22,padding:"16px 22px",zIndex:600,animation:"achPop .5s ease",boxShadow:`0 12px 40px rgba(0,0,0,0.5),0 0 0 3px ${n.tierColor}`,textAlign:"center",minWidth:230,maxWidth:320 }}>
              <div style={{ fontSize:9,color:n.tierColor,fontWeight:900,letterSpacing:2,marginBottom:4 }}>{tierLabel}</div>
              <div style={{ fontSize:40,marginBottom:4 }}>{a.icon}</div>
              <div style={{ fontSize:10,color:"#aaa",fontWeight:800,letterSpacing:2 }}>ERFOLG FREIGESCHALTET!</div>
              <div style={{ fontSize:15,fontWeight:900,color:"#fff",marginTop:4 }}>{a.name}</div>
              <div style={{ fontSize:10,color:"#888",marginTop:3 }}>{a.desc}</div>
              {a.reward?.type==="money"&&(
                <div style={{ marginTop:8,background:"rgba(255,215,0,0.15)",borderRadius:10,padding:"5px 10px",fontSize:12,fontWeight:900,color:"#FFD700" }}>+{fmtE(a.reward.val)} Belohnung</div>
              )}
            </div>
          );
        }
        if (n.type==='tuning') return (
          <div key={n.tl.id} style={{ position:"fixed",top:150,left:"50%",transform:"translateX(-50%)",background:`linear-gradient(135deg,${n.tl.col}ee,${n.tl.col}bb)`,borderRadius:22,padding:"16px 22px",zIndex:600,animation:"achPop .5s ease",boxShadow:`0 12px 40px rgba(0,0,0,0.4),0 0 0 3px #fff4`,textAlign:"center",minWidth:240,maxWidth:320 }}>
            <div style={{ fontSize:9,color:"rgba(255,255,255,0.8)",fontWeight:900,letterSpacing:2,marginBottom:4 }}>🔬 TUNING-METHODE ERFORSCHT!</div>
            <div style={{ fontSize:44,marginBottom:4 }}>{n.tl.icon}</div>
            <div style={{ fontSize:16,fontWeight:900,color:"#fff" }}>{n.tl.label}</div>
            <div style={{ fontSize:10,color:"rgba(255,255,255,0.75)",marginTop:3 }}>{n.tl.desc}</div>
            <div style={{ marginTop:10,background:"rgba(255,255,255,0.25)",borderRadius:10,padding:"6px 12px",fontSize:12,fontWeight:900,color:"#fff" }}>+{Math.round(n.tl.bonus*100)}% Wert · Jetzt anwendbar!</div>
          </div>
        );
        if (n.type==='blueprint') return (
          <div key={n.bp.id} style={{ position:"fixed",top:150,left:"50%",transform:"translateX(-50%)",background:"linear-gradient(135deg,#0a1628,#1a2e4a)",borderRadius:22,padding:"16px 22px",zIndex:600,animation:"achPop .5s ease",boxShadow:"0 12px 40px rgba(0,0,0,0.6),0 0 0 3px #4CAF5088",textAlign:"center",minWidth:240,maxWidth:320 }}>
            <div style={{ fontSize:9,color:"#4CAF50",fontWeight:900,letterSpacing:2,marginBottom:4 }}>🔬 PROTOTYP ENTWICKELT!</div>
            <div style={{ fontSize:44,marginBottom:6,animation:"float 2s ease-in-out infinite" }}>{n.bp.emoji}</div>
            <div style={{ fontSize:16,fontWeight:900,color:"#fff" }}>{n.bp.name}</div>
            <div style={{ fontSize:10,color:"#888",marginTop:3 }}>{n.bp.desc}</div>
            <div style={{ marginTop:10,background:"rgba(76,175,80,0.2)",borderRadius:10,padding:"6px 12px",fontSize:13,fontWeight:900,color:"#4CAF50" }}>Wert: {fmtE(n.bp.val)} · Jetzt baubar!</div>
          </div>
        );
        if (n.type==='offline') return (
          <div key="offline" style={{ position:"fixed",top:150,left:"50%",transform:"translateX(-50%)",background:"linear-gradient(135deg,#1a1a2e,#16213e)",borderRadius:20,padding:"16px 20px",zIndex:600,animation:"achPop .5s ease",boxShadow:"0 12px 40px rgba(0,0,0,0.5)",border:"3px solid #4CAF5066",minWidth:240,textAlign:"center" }}>
            <div style={{ fontSize:28,marginBottom:6 }}>💤</div>
            <div style={{ fontSize:10,color:"#4CAF50",fontWeight:800,letterSpacing:1 }}>OFFLINE-FORTSCHRITT</div>
            <div style={{ fontSize:13,color:"#fff",fontWeight:700,marginTop:4 }}>{n.mins} Minuten offline</div>
            <div style={{ display:"flex",gap:16,justifyContent:"center",marginTop:8 }}>
              {n.built>0&&<div><div style={{ fontSize:16 }}>🚗</div><div style={{ fontSize:12,color:"#FFD700",fontWeight:900 }}>+{n.built}</div></div>}
              {n.earned>0&&<div><div style={{ fontSize:16 }}>💰</div><div style={{ fontSize:12,color:"#FFD700",fontWeight:900 }}>+{fmtE(n.earned)}</div></div>}
            </div>
          </div>
        );
        return null;
      })()}

      {/* ── CONTENT ── */}
      <div style={{ flex:1,overflowY:"auto",padding:"10px 12px 100px" }}>

        {/* ══ FABRIK ══ */}
        {tab==="fabrik"&&(
          <div>
            {/* Compact hire bar — above Linie 1 */}
            <div style={{ display:"flex",alignItems:"center",gap:10,background:"#fff",borderRadius:14,border:"2px solid #4CAF5033",padding:"8px 12px",marginBottom:10,boxShadow:"0 2px 0 #4CAF5022" }}>
              <span style={{ fontSize:18 }}>👷</span>
              <div style={{ flex:1 }}>
                <span style={{ fontSize:12,fontWeight:900,color:"#333" }}>{gs.totalWorkers} Arbeiter</span>
                <span style={{ fontSize:11,color:"#aaa",marginLeft:6 }}>{freeW} frei · {fmtE(gs.totalWorkers*500)}/Tag</span>
              </div>
              <button onClick={hire} style={{ padding:"6px 12px",background:gs.money>=mechCost?"#4CAF50":"#eee",border:"none",borderRadius:10,color:gs.money>=mechCost?"#fff":"#bbb",fontWeight:900,fontSize:11,cursor:gs.money>=mechCost?"pointer":"default",boxShadow:gs.money>=mechCost?"0 3px 0 #2E7D32":"none",fontFamily:"'Nunito',sans-serif",whiteSpace:"nowrap" }}>
                + {fmtE(mechCost)}
              </button>
            </div>

            {visLines.map((line)=>{
              const lc    = LINE_COLORS[line.id];
              const model = ALL_MODELS.find(m=>m.id===line.modelId)||models[0];
              // All available models: current city + globally unlocked legacy models
              const unlockedIds = gs.unlockedModels||{};
              const currentCityIds = new Set(models.map(m=>m.id));
              const legacyModels = ALL_MODELS.filter(m=>unlockedIds[m.id]&&!currentCityIds.has(m.id));
              // Blueprint prototype cars (unlocked by engineers)
              const protoModels = BLUEPRINTS.filter(bp=>bp.cityIdx<=ci&&(gs.blueprints||{})[bp.id]).map(bp=>({
                id:bp.id, name:bp.name, emoji:bp.emoji, val:bp.val, ticks:Math.round(bp.val/models[0].val*models[0].ticks*0.8), mult:4.0, isProto:true
              }));
              const availModels = [...models, ...legacyModels, ...protoModels];
              const si    = line.stIdx;
              const curSt = si<activeSts.length?activeSts[si]:null;
              const oProg = line.unlocked&&line.workers>0?cl((si+line.prog)/Math.max(activeSts.length,1),0,1):0;
              const isOn  = line.unlocked&&line.workers>0;
              const techReq = LINE_TECH_REQ[line.id];
              const spec     = (gs.lineSpecs||{})[line.id];
              const canUnlock= !line.unlocked&&gs.money>=LINE_COSTS[line.id]&&(!techReq||gs.techs[techReq]);
              const techName  = techReq?TECH_TREE.find(t=>t.id===techReq)?.name:"";

              return (
                <div key={line.id} style={{ background:"#fff",borderRadius:18,border:`3px solid ${line.unlocked?(isOn?lc+"99":lc+"44"):"#e8e8e8"}`,boxShadow:isOn?`0 4px 0 ${lc}44`:"0 3px 0 #e8e8e8",marginBottom:12,overflow:"hidden" }}>
                  {/* Colored factory header */}
                  <div style={{ background:line.unlocked?`linear-gradient(135deg,${lc}ee,${lc}bb)`:"#f0f0f0",padding:"10px 13px",display:"flex",alignItems:"center",justifyContent:"space-between" }}>
                    <div style={{ display:"flex",alignItems:"center",gap:10 }}>
                      <div style={{ width:34,height:34,borderRadius:10,background:"rgba(255,255,255,0.25)",border:"2px solid rgba(255,255,255,0.45)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Fredoka One',cursive",fontSize:17,color:"#fff",fontWeight:900 }}>
                        {line.id+1}
                      </div>
                      <div>
                        <div style={{ fontSize:13,fontWeight:900,color:line.unlocked?"#fff":"#bbb",lineHeight:1.1 }}>
                          Linie {line.id+1}{spec&&<span style={{ fontSize:9,marginLeft:6,background:"rgba(255,255,255,0.3)",borderRadius:20,padding:"1px 7px" }}>{LINE_SPECS[spec].icon} {LINE_SPECS[spec].label}</span>}
                        </div>
                        {line.unlocked&&<div style={{ fontSize:11,color:"rgba(255,255,255,0.85)",marginTop:1 }}>{model.emoji} {model.name} · {isOn?`${Math.round(oProg*100)}% fertig`:"⏸ Warte auf Arbeiter"}</div>}
                      </div>
                    </div>
                    {line.unlocked?(
                      <div style={{ display:"flex",alignItems:"center",gap:5 }}>
                        <div style={{ display:"flex",gap:2,marginRight:3 }}>
                          {Array.from({length:Math.min(line.workers,5)}).map((_,wi)=>(
                            <div key={wi} style={{ width:8,height:16,borderRadius:3,background:"rgba(255,255,255,0.75)" }}/>
                          ))}
                          {line.workers>5&&<span style={{ fontSize:9,color:"rgba(255,255,255,0.8)",fontWeight:900,paddingLeft:2 }}>+{line.workers-5}</span>}
                        </div>
                        <button onClick={()=>setLW(line.id,-1)} style={{ width:28,height:28,borderRadius:8,background:"rgba(255,255,255,0.2)",border:"2px solid rgba(255,255,255,0.4)",color:"#fff",fontSize:16,fontWeight:900,cursor:line.workers>0?"pointer":"default",opacity:line.workers>0?1:0.4 }}>−</button>
                        <span style={{ fontSize:13,fontWeight:900,color:"#fff",minWidth:18,textAlign:"center" }}>{line.workers}</span>
                        <button onClick={()=>setLW(line.id,1)} style={{ width:28,height:28,borderRadius:8,background:"rgba(255,255,255,0.2)",border:"2px solid rgba(255,255,255,0.4)",color:"#fff",fontSize:16,fontWeight:900,cursor:freeW>0?"pointer":"default",opacity:freeW>0?1:0.4 }}>+</button>
                      </div>
                    ):(
                      <button onClick={()=>canUnlock?unlockLine(line.id):null}
                        style={{ fontSize:10,fontWeight:800,padding:"6px 12px",borderRadius:12,border:"none",background:canUnlock?"#FFD700":"#eee",color:canUnlock?"#333":"#bbb",cursor:canUnlock?"pointer":"default",boxShadow:canUnlock?"0 4px 0 #CCA80088":"none",fontFamily:"'Nunito',sans-serif" }}>
                        {techReq&&!gs.techs[techReq]?`🔒 ${techName}`:canUnlock?`🔓 ${fmtE(LINE_COSTS[line.id])}`:`💰 ${fmtE(LINE_COSTS[line.id])}`}
                      </button>
                    )}
                  </div>

                  {line.unlocked?(
                    <div style={{ padding:"11px 13px" }}>
                      {/* Status bar */}
                      <div style={{ height:8,background:"#f0f0f0",borderRadius:99,overflow:"hidden",marginBottom:10,boxShadow:"inset 0 1px 3px rgba(0,0,0,0.06)" }}>

                        {/* Model picker — current city + unlocked legacy */}
                        <div style={{ display:"flex",gap:3,flexShrink:0,overflowX:"auto",paddingBottom:2,maxWidth:210 }}>
                          {availModels.map((m,mi2)=>{
                            const isActive=line.modelId===m.id;
                            const isLegacy=!currentCityIds.has(m.id);
                            const mi=models.indexOf(m);
                            const globalUnlocked=!!(gs.unlockedModels||{})[m.id];

                            const panelOpen=showUnlockPanel&&showUnlockPanel.mi===mi&&showUnlockPanel.lineId===line.id&&mi>=0;
                            return (
                              <div key={m.id} style={{ position:"relative",flexShrink:0 }}>
                                <button
                                  onClick={()=>{
                                    if(canSwitch){ setLM(line.id,m.id); setShowUnlockPanel(null); }
                                    else if(mi>=0) setShowUnlockPanel(panelOpen?null:{mi,lineId:line.id});
                                  }}
                                  style={{ fontSize:16,width:34,height:34,borderRadius:10,
                                    border:`2px solid ${isActive?lc:isLegacy?"#FF980066":globalUnlocked?"#4CAF5044":"#e0e0e0"}`,
                                    background:isActive?`${lc}22`:isLegacy?"#FFF3E0":globalUnlocked?"#E8F5E9":"#fff",
                                    cursor:canSwitch?"pointer":"default",
                                    boxShadow:isActive?`0 3px 0 ${lc}44`:"0 2px 0 #e0e0e0",
                                    position:"relative",transition:"all .2s" }}>
