                                  {!canSwitch&&mi>=0&&<div style={{ position:"absolute",top:-5,right:-5,fontSize:10 }}>🔒</div>}
                                  {m.isProto&&<div style={{ position:"absolute",top:-5,left:-5,fontSize:8,background:"#4CAF50",borderRadius:99,padding:"1px 3px" }}>★</div>}
                                </button>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                      {/* Unlock panel */}
                      {showUnlockPanel&&showUnlockPanel.lineId===line.id&&(()=>{
                        const mi=showUnlockPanel.mi;
                        const m=models[mi];
                        if(!m) return null;
                        const req=MODEL_UNLOCK_REQ[mi]||MODEL_UNLOCK_REQ[0];
                        const cost=Math.round(m.val*req.cost);
                        const hasEnoughMoney=gs.money>=cost;
                        const canUnlock=hasEnoughMoney;
                        return (
                          <div style={{ background:`linear-gradient(135deg,${lc}15,${lc}08)`,border:`2px solid ${lc}55`,borderRadius:14,padding:"12px 14px",marginTop:8,marginBottom:2 }}>
                            <div style={{ display:"flex",alignItems:"center",gap:10,marginBottom:10 }}>
                              <span style={{ fontSize:28 }}>{m.emoji}</span>
                              <div style={{ flex:1 }}>
                                <div style={{ fontSize:13,fontWeight:900,color:"#333" }}>{m.name}</div>
                                <div style={{ fontSize:10,color:"#888" }}>Wert: {fmtE(m.val)} · Preis zum freischalten</div>
                              </div>
                              <button onClick={()=>setShowUnlockPanel(null)} style={{ fontSize:16,background:"none",border:"none",cursor:"pointer",color:"#aaa",padding:"0 4px" }}>✕</button>
                            </div>
                            {/* Requirements */}
                            <div style={{ display:"flex",gap:8,marginBottom:10 }}>
                              <div style={{ flex:1,background:hasEnoughMoney?"#E8F5E9":"#FFF3F3",borderRadius:10,padding:"8px 10px",textAlign:"center",border:`1px solid ${hasEnoughMoney?"#4CAF5044":"#FF444433"}` }}>
                                <div style={{ fontSize:16 }}>{hasEnoughMoney?"✅":"💰"}</div>
                                <div style={{ fontSize:11,fontWeight:800,color:hasEnoughMoney?"#4CAF50":"#E63946" }}>{fmtE(cost)}</div>
                                <div style={{ fontSize:9,color:"#aaa" }}>Kosten</div>
                              </div>
                            </div>
                            {/* Unlock button */}
                            <button onClick={()=>canUnlock&&unlockModel(mi)} style={{ width:"100%",padding:"10px",background:canUnlock?`linear-gradient(135deg,${lc},${lc}cc)`:"#e8e8e8",border:"none",borderRadius:12,color:canUnlock?"#fff":"#aaa",fontWeight:900,fontSize:13,cursor:canUnlock?"pointer":"default",fontFamily:"'Nunito',sans-serif",boxShadow:canUnlock?`0 4px 0 ${lc}55`:"none" }}>
                              {canUnlock?`🔓 ${m.name} freischalten`:"Nicht genug Geld"}
                            </button>
                            <div style={{ fontSize:9,color:"#aaa",textAlign:"center",marginTop:6 }}>Gilt für alle Produktionslinien ✓</div>
                          </div>
                        );
                      })()}

                      {/* Upgrade panel for already-unlocked models */}
                      {showUnlockPanel&&showUnlockPanel.lineId===line.id&&(()=>{
                        const mi=showUnlockPanel.mi;
                        const m=models[mi];
                        if(!m) return null;
                        const globalUnlocked=!!(gs.unlockedModels||{})[m.id];
                        if(!globalUnlocked) return null; // show only for unlocked
                        const upgLvl=(gs.modelUpgrades||{})[m.id]||0;
                        const maxed=upgLvl>=MODEL_UPGRADE_LEVELS;
                        return (
                          <div style={{ background:"linear-gradient(135deg,#E8F5E9,#F1F8E9)",border:"2px solid #4CAF5066",borderRadius:14,padding:"12px 14px",marginTop:8 }}>
                            <div style={{ display:"flex",alignItems:"center",gap:8,marginBottom:10 }}>
                              <span style={{ fontSize:22 }}>{m.emoji}</span>
                              <div style={{ flex:1 }}>
                                <div style={{ fontSize:12,fontWeight:900,color:"#333" }}>{m.name} — Upgrade</div>
                                <div style={{ fontSize:10,color:"#888" }}>Stufe {upgLvl}/{MODEL_UPGRADE_LEVELS} · Jede Stufe +20% Basiswert</div>
                              </div>
                              <button onClick={()=>setShowUnlockPanel(null)} style={{ fontSize:14,background:"none",border:"none",cursor:"pointer",color:"#aaa" }}>✕</button>
                            </div>
                            {/* Level bars */}
                            <div style={{ display:"flex",gap:4,marginBottom:10 }}>
                              {Array.from({length:MODEL_UPGRADE_LEVELS}).map((_,li)=>(
                                <div key={li} style={{ flex:1,height:8,borderRadius:99,background:li<upgLvl?"#4CAF50":li===upgLvl?"#4CAF5033":"#e0e0e0" }}/>
                              ))}
                            </div>
                            {!maxed?(()=>{
                              const cost=Math.round(m.val*MODEL_UPGRADE_COST_MULT[upgLvl]);
                              const canUp=gs.money>=cost;
                              return (
                                <button onClick={()=>upgradeModel(m.id)}
                                  style={{ width:"100%",padding:"10px",background:canUp?"linear-gradient(135deg,#4CAF50,#388E3C)":"#e8e8e8",border:"none",borderRadius:12,color:canUp?"#fff":"#aaa",fontWeight:900,fontSize:12,cursor:canUp?"pointer":"default",fontFamily:"'Nunito',sans-serif",boxShadow:canUp?"0 4px 0 #2E7D3255":"none" }}>
                                  {canUp?`⬆️ Upgrade Stufe ${upgLvl+1} — ${fmtE(cost)}`:`💰 ${fmtE(cost)} nötig`}
                                </button>
                              );
                            })():(
                              <div style={{ textAlign:"center",color:"#4CAF50",fontWeight:900,fontSize:12 }}>✅ Maximale Stufe erreicht! +{MODEL_UPGRADE_LEVELS*20}% Wert</div>
                            )}
                          </div>
                        );
                      })()}

                      {/* Station belt — bigger, more visual */}
                      <div style={{ display:"flex",gap:5,overflowX:"auto",paddingBottom:4,paddingTop:4,
                        scrollbarWidth:"none",WebkitOverflowScrolling:"touch",msOverflowStyle:"none" }}>
                        {activeSts.map((st,si2)=>{
                          const done=line.stIdx>si2||(line.stIdx===si2&&line.prog>=0.99);
                          const curr=isOn&&line.stIdx===si2;
                          const tapKey=`${line.id}_${si2}`;
                          return (
                            <div key={st.id} onClick={()=>curr&&tapStation(line.id,si2)}
                              style={{ position:"relative",flexShrink:0,width:70,height:90,
                                borderRadius:18,overflow:"hidden",cursor:curr?"pointer":"default",
                                background:done?st.bg:curr?st.bg:"#f8f8f8",
                                border:`2.5px solid ${done?st.col+"99":curr?st.col:"#e8e8e8"}`,
                                boxShadow:curr?`0 4px 16px ${st.col}44,0 0 0 2px ${st.col}22`:"0 2px 6px rgba(0,0,0,0.06)",
                                transition:"all .25s" }}>
                              {/* Shine when active */}
                              {curr&&<div style={{ position:"absolute",inset:0,background:"linear-gradient(135deg,rgba(255,255,255,0.35),transparent)",pointerEvents:"none" }}/>}
                              {/* Done tick */}
                              {done&&<div style={{ position:"absolute",top:5,right:6,fontSize:11,fontWeight:900,color:st.col }}>✓</div>}
                              {/* TAP hint */}
                              {curr&&<div style={{ position:"absolute",top:4,left:5,fontSize:7,fontWeight:900,color:st.col+"cc",letterSpacing:0.5 }}>TAP</div>}
                              {/* Flash ring */}
                              {tapFlashes[tapKey]&&<div style={{ position:"absolute",inset:0,borderRadius:16,border:`3px solid ${st.col}`,animation:"tapFlash 0.4s ease-out forwards",pointerEvents:"none" }}/>}
                              {/* Machine texture */}
                              <div style={{ position:"absolute",bottom:0,left:0,right:0,fontSize:8,opacity:0.1,lineHeight:1,overflow:"hidden",height:22,userSelect:"none",letterSpacing:-1,color:st.col }}>{st.machine}{st.machine}</div>
                              {/* Main icon */}
                              <div style={{ position:"absolute",top:"18%",left:"50%",transform:"translateX(-50%)",fontSize:26,
                                animation:curr?"stationPulse 1.8s ease infinite":"none",
                                filter:curr?`drop-shadow(0 2px 8px ${st.col}88)`:"none" }}>{st.icon}</div>
                              {/* Progress ring / fill */}
                              {curr&&(
                                <div style={{ position:"absolute",bottom:0,left:0,right:0,height:`${Math.round(line.prog*100)}%`,
                                  background:`linear-gradient(0deg,${st.col}33,transparent)`,
                                  transition:"height .15s",borderRadius:"0 0 16px 16px" }}/>
                              )}
                              {/* Label */}
                              <div style={{ position:"absolute",bottom:7,left:0,right:0,textAlign:"center",
                                fontSize:8,fontWeight:900,color:done?st.col:curr?st.col:"#bbb",letterSpacing:0.2 }}>
                                {curr?`${Math.round(line.prog*100)}%`:st.name}
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  ):(
                    <div style={{ padding:"18px 13px",textAlign:"center",color:"#ccc",fontSize:12,fontWeight:700 }}>
                      {techReq&&!gs.techs[techReq]?`🔬 Forsche "${techName}" frei!`:`Tippe Freischalten für Linie ${line.id+1}`}
                    </div>
                  )}
                </div>
              );
            })}

            {/* Season Challenge */}
            {gs.seasonChallenge&&!gs.seasonChallenge.claimed&&(
              <div style={{ background:"linear-gradient(135deg,#1a1a2e,#16213e)",border:"2px solid #FFD70044",borderRadius:16,padding:"12px 14px",marginTop:4 }}>
                <div style={{ display:"flex",alignItems:"center",gap:10 }}>
                  <span style={{ fontSize:26 }}>{gs.seasonChallenge.icon}</span>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:11,color:"#FFD700",fontWeight:800 }}>🏅 SAISON-CHALLENGE</div>
                    <div style={{ fontSize:12,color:"#fff",fontWeight:700,marginTop:2 }}>{gs.seasonChallenge.goal}</div>
                    <div style={{ height:6,background:"#ffffff18",borderRadius:99,marginTop:6,overflow:"hidden" }}>
                      <div style={{ height:"100%",background:"linear-gradient(90deg,#FFD700,#FF9800)",borderRadius:99,width:`${cl(((gs.seasonChallenge.current||0)/gs.seasonChallenge.target)*100,0,100)}%`,transition:"width .5s" }}/>
                    </div>
                    <div style={{ fontSize:9,color:"#aaa",marginTop:3 }}>{gs.seasonChallenge.current||0}/{gs.seasonChallenge.target} · {gs.seasonChallenge.dayEnd-gs.gameDay} Tage verbleibend</div>
                  </div>
                  <div style={{ textAlign:"right" }}>
                    <div style={{ fontSize:14,fontWeight:900,color:"#FFD700" }}>{fmtE(gs.seasonChallenge.reward)}</div>
                    <div style={{ fontSize:9,color:"#666" }}>Belohnung</div>
                  </div>
                </div>
              </div>
            )}

            <div style={{ textAlign:"center",fontSize:10,color:"rgba(0,0,0,0.2)",fontWeight:700,padding:"6px 0" }}>
              🏭 {gs.totalBuilt} GEBAUT · 👆 {gs.totalTaps||0} TAPS · {CITIES[ci].maxLines} LINIEN
            </div>
          </div>
        )}

        {/* ══ AUFTRÄGE ══ */}
        {/* ══ SHOWROOM ══ */}
        {/* ══ MISSIONEN ══ */}
        {tab==="missions"&&(()=>{
          const slotIdx = (gs.loginStreak||0) % 7;
          const todayClaimed = gs.lastLoginDay >= gs.gameDay;
          return (
            <div>
              {/* ─ Login Kalender ─ */}
              <div style={{ background:"linear-gradient(135deg,#1a1a2e,#16213e)",borderRadius:20,padding:"16px",marginBottom:14,border:"2px solid #FFD70033" }}>
                <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12 }}>
                  <div>
                    <div style={{ fontSize:15,fontWeight:900,color:"#fff",fontFamily:"'Fredoka One',cursive" }}>🎁 Täglicher Login-Bonus</div>
                    <div style={{ fontSize:10,color:"#888",marginTop:1 }}>
                      {todayClaimed ? `✅ Heute abgeholt · Streak: ${gs.loginStreak||0} Tage 🔥` : `⏳ Noch nicht abgeholt · Streak: ${gs.loginStreak||0} Tage`}
                    </div>
                  </div>
                  {!todayClaimed&&(
                    <div style={{ fontSize:10,color:"#FFD700",fontWeight:900,animation:"bounce 1s ease infinite" }}>TAP!</div>
                  )}
                </div>
                <div style={{ display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:5 }}>
                  {LOGIN_REWARDS.map((r,i)=>{
                    const isCurrent = i===slotIdx;
                    const isPast = i<slotIdx||(todayClaimed&&i===slotIdx);
                    const isNext = !todayClaimed&&i===slotIdx;
                    return (
                      <button key={i} onClick={()=>isNext?claimLoginReward(r):null}
                        style={{ padding:"8px 3px",borderRadius:12,border:`2px solid ${isNext?"#FFD700":isPast?"#4CAF5044":"rgba(255,255,255,0.08)"}`,background:isNext?"#FFD70022":isPast?"#4CAF5022":"rgba(255,255,255,0.04)",cursor:isNext?"pointer":"default",textAlign:"center",transition:"all .2s",boxShadow:isNext?"0 0 16px #FFD70044":"none" }}>
                        <div style={{ fontSize:r.special?20:14,marginBottom:2 }}>{r.icon}</div>
                        <div style={{ fontSize:6,color:isNext?"#FFD700":isPast?"#4CAF50":"#555",fontWeight:800,lineHeight:1.2 }}>{isPast?"✓":r.special?"MEGA":r.label.split('-')[0]}</div>
                        <div style={{ fontSize:7,color:"#333",marginTop:2,fontWeight:700 }}>T{i+1}</div>
                      </button>
                    );
                  })}
                </div>
                {!todayClaimed&&(
                  <button onClick={()=>claimLoginReward(LOGIN_REWARDS[slotIdx])}
                    style={{ width:"100%",marginTop:12,padding:"12px",background:"linear-gradient(135deg,#FFD700,#FF9800)",border:"none",borderRadius:14,color:"#222",fontWeight:900,fontSize:14,cursor:"pointer",fontFamily:"'Fredoka One',cursive",boxShadow:"0 4px 0 #FF980088" }}>
                    🎁 Tag-{slotIdx+1}-Bonus abholen!
                  </button>
                )}
              </div>

              {/* ─ Daily Missions ─ */}
              <div style={{ fontSize:11,fontWeight:900,color:"#333",letterSpacing:0.5,marginBottom:10 }}>📋 TAGES-MISSIONEN — Tag {gs.gameDay}</div>
              {(gs.dailyMissions||[]).map((m,i)=>{
                const pct=Math.min(100,Math.round((m.current/m.target)*100));
                const done=m.current>=m.target;
                const reward=MISSION_REWARDS[i]||5000;
                return (
                  <div key={m.id||i} style={{ background:m.claimed?"#f8fff8":done?"#FFFDE7":"#fff",border:`2px solid ${m.claimed?"#4CAF5033":done?"#FFD70066":"#e8e8e8"}`,borderRadius:18,padding:"14px 16px",marginBottom:10,boxShadow:done&&!m.claimed?"0 4px 0 #FFD70044":"0 2px 0 #ebebeb" }}>
                    <div style={{ display:"flex",alignItems:"center",gap:12 }}>
                      <div style={{ fontSize:28,flexShrink:0 }}>{m.icon}</div>
                      <div style={{ flex:1 }}>
                        <div style={{ fontSize:13,fontWeight:900,color:m.claimed?"#aaa":"#333" }}>{m.text}</div>
                        <div style={{ display:"flex",alignItems:"center",gap:8,marginTop:6 }}>
                          <div style={{ flex:1,height:6,background:"#f0f0f0",borderRadius:99,overflow:"hidden" }}>
                            <div style={{ height:"100%",background:m.claimed?"#4CAF50":done?"#FFD700":"#FF6B35",width:`${pct}%`,transition:"width .5s",borderRadius:99 }}/>
                          </div>
                          <div style={{ fontSize:10,color:"#aaa",minWidth:50,textAlign:"right",fontWeight:800 }}>
                            {m.claimed?"✅ Fertig":`${m.current}/${m.target}`}
                          </div>
                        </div>
                      </div>
                      <div style={{ textAlign:"center",flexShrink:0 }}>
                        {m.claimed?(
                          <div style={{ fontSize:22 }}>✅</div>
                        ):done?(
                          <button onClick={()=>claimMission(i)} style={{ padding:"9px 14px",background:"linear-gradient(135deg,#FFD700,#FF9800)",border:"none",borderRadius:12,color:"#222",fontWeight:900,fontSize:11,cursor:"pointer",fontFamily:"'Nunito',sans-serif",boxShadow:"0 4px 0 #FF980066",whiteSpace:"nowrap" }}>
                            +{fmtE(reward)}
                          </button>
                        ):(
                          <div style={{ textAlign:"center" }}>
                            <div style={{ fontSize:11,fontWeight:900,color:"#FF6B35" }}>{fmtE(reward)}</div>
                            <div style={{ fontSize:8,color:"#ccc" }}>Belohnung</div>
                          </div>
                        )}
                      </div>
                    </div>
                  </div>
                );
              })}

              {/* ─ Aufträge (moved here) ─ */}
              <div style={{ fontSize:11,fontWeight:900,color:"#333",letterSpacing:0.5,margin:"16px 0 10px" }}>📋 OFFENE AUFTRÄGE</div>
              {(gs.contracts||[]).filter(c=>!c.claimed).length===0?(
                <div style={{ textAlign:"center",padding:"20px 0",color:"#bbb",fontSize:12 }}>Keine offenen Aufträge — Autos verkaufen um neue zu erhalten</div>
              ):(gs.contracts||[]).filter(c=>!c.claimed).map(c=>{
                const m=ALL_MODELS.find(x=>x.id===c.modelId)||{emoji:"🚗",name:c.modelId};
                const val=Math.round((c.val||0)*streakMult*repBonus);
                const inShowroom=gs.parked.some(p=>p.modelId===c.modelId);
                const ttl=c.ttl||200;
                const left=c.ticksLeft||ttl;
                const urgent=left<ttl*0.3;
                return (
                  <div key={c.id} style={{ background:c.isVip?"linear-gradient(135deg,#FFF8E7,#FFFDE7)":"#fff",border:`2px solid ${c.isVip?"#FFD70066":"#e8e8e8"}`,borderRadius:16,padding:"12px 14px",marginBottom:10,display:"flex",alignItems:"center",gap:12,boxShadow:c.isVip?"0 4px 0 #FFD70033":"0 2px 0 #ebebeb" }}>
                    <div style={{ fontSize:28 }}>{m.emoji}</div>
                    <div style={{ flex:1 }}>
                      <div style={{ display:"flex",alignItems:"center",gap:6 }}>
                        <span style={{ fontSize:12,fontWeight:900,color:"#333" }}>{m.name}</span>
                        {c.isVip&&<span style={{ fontSize:8,background:"#FFD700",color:"#222",borderRadius:99,padding:"1px 6px",fontWeight:900 }}>VIP</span>}
                      </div>
                      <div style={{ height:3,background:"#f0f0f0",borderRadius:99,marginTop:4,overflow:"hidden" }}>
                        <div style={{ height:"100%",background:urgent?"#E63946":c.isVip?"#FFD700":"#FF6B35",width:`${Math.round((left/ttl)*100)}%`,transition:"width .5s",borderRadius:99 }}/>
                      </div>
                    </div>
                    <div style={{ textAlign:"right" }}>
                      <div style={{ fontSize:13,fontWeight:900,color:c.isVip?"#B8860B":city.accent }}>{fmtE(val)}</div>
                      <div style={{ fontSize:8,color:urgent?"#E63946":"#bbb" }}>{urgent?"⚠️ Läuft ab!":"⏱️"}</div>
                    </div>
                  </div>
                );
              })}
            </div>
          );
        })()}

        {tab==="showroom"&&(()=>{
          // Build list: all models across all cities up to current + unlocked + protos
          const allAvail = [];
          for(let cIdx=0;cIdx<=ci;cIdx++){
            CITY_MODELS[cIdx].forEach((m,mi)=>{
              const unlocked=!!(gs.unlockedModels||{})[m.id]||(cIdx===0&&mi===0);
              const upgLvl=(gs.modelUpgrades||{})[m.id]||0;
              allAvail.push({...m,cIdx,mi,unlocked,upgLvl,isProto:false});
            });
          }
          // Proto models
          BLUEPRINTS.filter(b=>b.cityIdx<=ci&&(gs.blueprints||{})[b.id]).forEach(bp=>{
            allAvail.push({id:bp.id,name:bp.name,emoji:bp.emoji,val:bp.val,ticks:300,upgLvl:0,cIdx:bp.cityIdx,mi:-1,unlocked:true,isProto:true});
          });
          const [srCity,setSrCity] = [ci,()=>{}]; // show by city
          return (
            <div>
              {/* Header */}
              <div style={{ background:`linear-gradient(135deg,${city.accent}22,${city.accent}08)`,borderRadius:18,padding:"12px 16px",marginBottom:14,border:`2px solid ${city.accent}33` }}>
                <div style={{ fontSize:15,fontWeight:900,color:"#333" }}>{city.flag} {city.name} — Fahrzeug-Showroom</div>
                <div style={{ fontSize:10,color:"#aaa",marginTop:2 }}>
                  {allAvail.filter(m=>m.unlocked).length} Modelle verfügbar · {allAvail.filter(m=>!m.unlocked).length} gesperrt
                </div>
                <div style={{ height:6,background:"rgba(255,255,255,0.5)",borderRadius:99,marginTop:8,overflow:"hidden" }}>
                  <div style={{ height:"100%",background:`linear-gradient(90deg,${city.accent},${city.accent}88)`,borderRadius:99,width:`${Math.round(allAvail.filter(m=>m.unlocked).length/Math.max(1,allAvail.length)*100)}%`,transition:"width .5s" }}/>
                </div>
              </div>

              {/* City sections */}
              {Array.from({length:ci+1},(_,cIdx)=>{
                const cityMs = allAvail.filter(m=>m.cIdx===cIdx&&!m.isProto);
                if(!cityMs.length) return null;
                const c2=CITIES[cIdx];
                return (
                  <div key={cIdx} style={{ marginBottom:20 }}>
                    <div style={{ fontSize:11,fontWeight:900,color:"#555",letterSpacing:0.5,marginBottom:10,display:"flex",alignItems:"center",gap:6 }}>
                      <span style={{ fontSize:16 }}>{c2.flag}</span>{c2.name}
                      <div style={{ flex:1,height:1,background:"#f0f0f0",marginLeft:4 }}/>
                    </div>
                    <div style={{ display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10 }}>
                      {cityMs.map(m=>{
                        const locked=!m.unlocked;
                        const upgLvl=m.upgLvl||0;
                        const effectiveVal=Math.round(m.val*(1+upgLvl*0.2));
                        const unlockCost=m.mi===0?0:Math.round(m.val*([0,1.5,3.0][m.mi]||3));
                        const canUnlock=!locked||gs.money>=unlockCost;
                        return (
                          <div key={m.id} onClick={()=>{
                            if(locked&&unlockCost>0&&gs.money>=unlockCost){
                              setGS(p=>({...p,money:p.money-unlockCost,unlockedModels:{...p.unlockedModels,[m.id]:true},modelUpgrades:{...(p.modelUpgrades||{}),[m.id]:0}}));
                              notifQueuePush({type:'toast',msg:`🚗 ${m.name} freigeschaltet!`});
                            }
                          }} style={{ background:locked?"#f5f5f5":`linear-gradient(160deg,${c2.accent}12,${c2.accent}04)`,border:`2px solid ${locked?"#e0e0e0":c2.accent+"55"}`,borderRadius:18,padding:"14px 10px 12px",textAlign:"center",cursor:locked&&unlockCost>0?"pointer":"default",boxShadow:locked?"0 2px 0 #e8e8e8":`0 4px 0 ${c2.accent}33`,position:"relative",transition:"all .2s" }}>
                            {/* Proto star */}
                            {m.isProto&&<div style={{ position:"absolute",top:6,left:6,fontSize:9,color:"#4CAF50",fontWeight:900 }}>★</div>}
                            {/* Upgrade level */}
                            {upgLvl>0&&<div style={{ position:"absolute",top:6,right:6,background:"#4CAF50",color:"#fff",fontSize:7,fontWeight:900,borderRadius:99,padding:"1px 5px" }}>+{upgLvl*20}%</div>}
                            {/* Car on pedestal */}
                            <div style={{ position:"relative",marginBottom:6 }}>
                              <div style={{ fontSize:44,filter:locked?"grayscale(0.8) opacity(0.4)":"none",animation:locked?"none":"float 3s ease-in-out infinite",animationDelay:`${m.mi*0.5}s` }}>{m.emoji}</div>
                              {/* Pedestal shadow */}
                              <div style={{ width:50,height:6,background:locked?"#e0e0e0":c2.accent+"33",borderRadius:"50%",margin:"-4px auto 0",filter:"blur(2px)" }}/>
                            </div>
                            <div style={{ fontSize:11,fontWeight:900,color:locked?"#bbb":"#333",marginBottom:2 }}>{m.name}</div>
                            {!locked?(
                              <>
                                <div style={{ fontSize:12,fontWeight:900,color:c2.accent }}>{fmtE(effectiveVal)}</div>
                                {upgLvl<5&&(
                                  <button onClick={e=>{e.stopPropagation();
                                    const cost2=Math.round(m.val*([1,2.5,6,15,40][upgLvl]||40));
                                    if(gs.money>=cost2){setGS(p=>({...p,money:p.money-cost2,modelUpgrades:{...(p.modelUpgrades||{}),[m.id]:(p.modelUpgrades||{})[m.id]+1||1}}));notifQueuePush({type:'toast',msg:`⬆️ ${m.name} Stufe ${upgLvl+1}!`});}
                                  }} style={{ marginTop:6,fontSize:8,padding:"4px 8px",background:gs.money>=Math.round(m.val*([1,2.5,6,15,40][upgLvl]||40))?"#4CAF50":"#e8e8e8",border:"none",borderRadius:8,color:gs.money>=Math.round(m.val*([1,2.5,6,15,40][upgLvl]||40))?"#fff":"#aaa",fontWeight:900,cursor:"pointer",fontFamily:"'Nunito',sans-serif" }}>
                                    ⬆️ {fmtE(Math.round(m.val*([1,2.5,6,15,40][upgLvl]||40)))}
                                  </button>
                                )}
                                {upgLvl>=5&&<div style={{ fontSize:8,color:"#4CAF50",fontWeight:900,marginTop:4 }}>✅ MAX</div>}
                              </>
                            ):(
                              <div style={{ fontSize:9,color:canUnlock?"#FF9800":"#ccc",fontWeight:800,marginTop:2 }}>
                                {unlockCost===0?"Gratis 🎁":canUnlock?`🔓 ${fmtE(unlockCost)}`:`🔒 ${fmtE(unlockCost)}`}
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}

              {/* Prototypes section */}
              {allAvail.filter(m=>m.isProto).length>0&&(
                <div style={{ marginTop:8 }}>
                  <div style={{ fontSize:11,fontWeight:900,color:"#4CAF50",letterSpacing:0.5,marginBottom:10,display:"flex",alignItems:"center",gap:6 }}>
                    <span>🔬</span>Ingenieur-Prototypen
                    <div style={{ flex:1,height:1,background:"#E8F5E9",marginLeft:4 }}/>
                  </div>
                  <div style={{ display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10 }}>
                    {allAvail.filter(m=>m.isProto).map(m=>(
                      <div key={m.id} style={{ background:"linear-gradient(135deg,#0a1628,#1a2e4a)",border:"2px solid #4CAF5066",borderRadius:18,padding:"14px 12px",textAlign:"center",boxShadow:"0 4px 0 #4CAF5022" }}>
                        <div style={{ fontSize:9,color:"#4CAF50",fontWeight:900,letterSpacing:1,marginBottom:6 }}>★ PROTOTYP</div>
                        <div style={{ fontSize:40,animation:"float 2s ease-in-out infinite",marginBottom:6 }}>{m.emoji}</div>
                        <div style={{ width:50,height:5,background:"#4CAF5033",borderRadius:"50%",margin:"-2px auto 8px",filter:"blur(2px)" }}/>
                        <div style={{ fontSize:12,fontWeight:900,color:"#fff" }}>{m.name}</div>
                        <div style={{ fontSize:13,fontWeight:900,color:"#4CAF50",marginTop:4 }}>{fmtE(m.val)}</div>
                        <div style={{ fontSize:8,color:"#666",marginTop:3 }}>Jetzt auf Linien baubar</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* Locked prototypes teaser */}
              {BLUEPRINTS.filter(b=>b.cityIdx<=ci&&!(gs.blueprints||{})[b.id]).length>0&&(
                <div style={{ marginTop:14,background:"#f8f8f8",borderRadius:16,padding:"12px 14px",border:"2px dashed #e0e0e0" }}>
                  <div style={{ fontSize:10,fontWeight:900,color:"#bbb",letterSpacing:1,marginBottom:8 }}>🔬 PROTOTYPEN IN FORSCHUNG</div>
                  <div style={{ display:"flex",gap:8,flexWrap:"wrap" }}>
                    {BLUEPRINTS.filter(b=>b.cityIdx<=ci&&!(gs.blueprints||{})[b.id]).map(bp=>{
                      const researching=(gs.engineers||[]).find(e=>e.blueprintId===bp.id);
                      const pct=researching?Math.round(((researching.researchProgress||0)/bp.researchCost)*100):0;
                      return (
                        <div key={bp.id} style={{ textAlign:"center",padding:"8px 10px",background:"#fff",borderRadius:12,border:`2px solid ${researching?"#4CAF5044":"#ececec"}`,minWidth:60 }}>
                          <div style={{ fontSize:22,filter:"grayscale(1) opacity(0.5)" }}>{bp.emoji}</div>
                          <div style={{ fontSize:8,color:researching?"#4CAF50":"#ccc",fontWeight:800,marginTop:2 }}>{researching?`${pct}%`:"🔒"}</div>
                          <div style={{ fontSize:7,color:"#ddd",marginTop:1 }}>{bp.name.split(' ').slice(0,2).join(' ')}</div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
            </div>
          );
        })()}

        {/* ══ FORSCHUNG ══ */}
        {/* ══ INGENIEURE ══ */}
        {tab==="forschen"&&(()=>{
          const [forschTab, setForschTab] = React.useState('tech');
          return (
          <div>
            {/* Sub-nav */}
            <div style={{ display:"flex",gap:6,marginBottom:14,background:"#fff",borderRadius:16,padding:5,boxShadow:"0 2px 0 #ebebeb" }}>
              {[["tech","🔬","Technologien"],["ing","🧑‍🔬","Ingenieure"]].map(([k,ic,lb])=>(
                <button key={k} onClick={()=>setForschTab(k)} style={{ flex:1,padding:"9px 6px",borderRadius:12,border:"none",background:forschTab===k?"linear-gradient(135deg,#4CAF50,#388E3C)":"transparent",color:forschTab===k?"#fff":"#aaa",fontWeight:900,fontSize:12,cursor:"pointer",fontFamily:"'Nunito',sans-serif",boxShadow:forschTab===k?"0 3px 0 #2E7D3255":"none",transition:"all .2s",display:"flex",alignItems:"center",justifyContent:"center",gap:5 }}>
                  <span>{ic}</span>{lb}
                </button>
              ))}
            </div>

            {/* ── TECHNOLOGIEN ── */}
            {forschTab==='tech'&&(()=>{
              const disc=getResearchDiscount(gs.techs);
              const cats=[{key:"prod",label:"⚙️ Produktion",col:"#FF6B35"},{key:"sale",label:"💰 Vertrieb",col:"#4CAF50"},{key:"mgmt",label:"👔 Management",col:"#2196F3"}];
              return (
                <div>
                  {disc<1&&<div style={{ background:"#E8F5E9",borderRadius:12,padding:"8px 12px",marginBottom:10,fontSize:11,fontWeight:800,color:"#4CAF50" }}>🧪 F&E-Abteilung aktiv: −{Math.round((1-disc)*100)}% auf alle Techs</div>}
                  {cats.map(({key,label,col})=>{
                    const nodes=flattenTree(key);
                    return (
                      <div key={key} style={{ marginBottom:16 }}>
                        <div style={{ fontSize:11,fontWeight:900,color:col,letterSpacing:0.5,marginBottom:8 }}>{label}</div>
                        {nodes.map(tech=>{
                          const owned=!!gs.techs[tech.id];
                          const reqOk=!tech.req||!!gs.techs[tech.req];
                          const cityOk=ci>=tech.city;
                          const discCost=Math.round(tech.cost*disc);
                          const canBuy=!owned&&cityOk&&reqOk&&gs.money>=discCost;
                          const locked=!cityOk||(!owned&&!reqOk);
                          return (
                            <div key={tech.id} onClick={()=>canBuy&&research(tech)}
                              style={{ marginLeft:tech.depth*14,marginBottom:6,background:owned?"linear-gradient(135deg,#E8F5E9,#F1F8E9)":locked?"#fafafa":"#fff",border:`2px solid ${owned?"#4CAF5066":canBuy?col+"66":"#ebebeb"}`,borderRadius:14,padding:"10px 12px",cursor:canBuy?"pointer":"default",display:"flex",alignItems:"center",gap:10,opacity:locked?0.45:1,boxShadow:canBuy?`0 3px 0 ${col}33`:"0 2px 0 #ebebeb",transition:"all .2s" }}>
                              <span style={{ fontSize:22,flexShrink:0 }}>{tech.icon}</span>
                              <div style={{ flex:1 }}>
                                <div style={{ fontSize:12,fontWeight:900,color:owned?"#4CAF50":locked?"#bbb":"#333" }}>{tech.name}</div>
                                <div style={{ fontSize:10,color:"#888",marginTop:1 }}>{tech.desc}</div>
                                {!cityOk&&<div style={{ fontSize:9,color:"#bbb",marginTop:1 }}>🏙️ Verfügbar ab Stadt {tech.city+1}</div>}
                              </div>
                              {owned?(
                                <div style={{ fontSize:18 }}>✅</div>
                              ):cityOk&&reqOk?(
                                <div style={{ textAlign:"right",flexShrink:0 }}>
                                  <div style={{ fontSize:12,fontWeight:900,color:gs.money>=discCost?col:"#ccc" }}>{fmtE(discCost)}</div>
                                  {disc<1&&<div style={{ fontSize:8,color:"#4CAF50" }}>−{Math.round((1-disc)*100)}%</div>}
                                </div>
                              ):(
                                <div style={{ fontSize:16 }}>🔒</div>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    );
                  })}
                </div>
              );
            })()}

            {/* ── INGENIEURE ── */}
            {forschTab==='ing'&&(
              <div>
                {/* Header */}
                <div style={{ background:"linear-gradient(135deg,#0a1628,#1a2e4a)",borderRadius:18,padding:"14px 16px",marginBottom:12,border:"2px solid #4CAF5044" }}>
                  <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between" }}>
                    <div>
                      <div style={{ fontSize:14,fontWeight:900,color:"#fff" }}>🧑‍🔬 Ingenieur-Labor</div>
                      <div style={{ fontSize:10,color:"#888",marginTop:2 }}>{(gs.engineers||[]).length}/{engSlots} Slots · Erforschen Tuning & Prototypen</div>
                    </div>
                    <div style={{ textAlign:"right" }}>
                      <div style={{ fontSize:12,fontWeight:900,color:"#4CAF50" }}>{Object.keys(gs.blueprints||{}).length}/{BLUEPRINTS.filter(b=>b.cityIdx<=ci).length}</div>
                      <div style={{ fontSize:9,color:"#666" }}>Blaupausen</div>
                    </div>
                  </div>
                  <div style={{ display:"flex",gap:6,marginTop:10,flexWrap:"wrap" }}>
                    {BLUEPRINTS.filter(b=>b.cityIdx<=ci).map(bp=>{
                      const done=(gs.blueprints||{})[bp.id];
                      const researching=(gs.engineers||[]).find(e=>e.blueprintId===bp.id&&e.assignment==='research');
                      const pct=researching?Math.round(((researching.researchProgress||0)/bp.researchCost)*100):done?100:0;
                      return (
                        <div key={bp.id} style={{ background:done?"#4CAF5022":researching?"#2196F322":"rgba(255,255,255,0.06)",border:`1px solid ${done?"#4CAF5066":researching?"#2196F366":"rgba(255,255,255,0.1)"}`,borderRadius:10,padding:"5px 8px",textAlign:"center",minWidth:60 }}>
                          <div style={{ fontSize:16 }}>{bp.emoji}</div>
                          <div style={{ fontSize:7,color:done?"#4CAF50":researching?"#2196F3":"#666",fontWeight:800,marginTop:1 }}>{done?"✓":researching?`${pct}%`:"🔒"}</div>
                        </div>
                      );
                    })}
            </div>

            {/* Hired Engineers */}
            {(gs.engineers||[]).length>0&&(
              <div style={{ marginBottom:12 }}>
                <div style={{ fontSize:11,fontWeight:900,color:"#333",letterSpacing:0.5,marginBottom:8 }}>🏭 MEIN TEAM</div>
                {(gs.engineers||[]).map(engInst=>{
                  const eng=ENGINEER_POOL.find(e=>e.id===engInst.engId);
                  if(!eng) return null;
                  const sp=ENG_SPECS[eng.spec];
                  const xpPct=Math.round(((engInst.xp||0)%100));
                  const assignedBp=engInst.blueprintId?BLUEPRINTS.find(b=>b.id===engInst.blueprintId):null;
                  const bpPct=assignedBp?Math.round(((engInst.researchProgress||0)/assignedBp.researchCost)*100):0;
                  const assignedLine=engInst.lineId!=null?visLines.find(l=>l.id===engInst.lineId):null;
                  return (
                    <div key={engInst.id} style={{ background:"#fff",border:`2px solid ${sp.col}44`,borderRadius:16,padding:"12px 14px",marginBottom:10,boxShadow:`0 3px 0 ${sp.col}22` }}>
                      <div style={{ display:"flex",alignItems:"center",gap:10,marginBottom:8 }}>
                        <div style={{ fontSize:28 }}>{eng.emoji}</div>
                        <div style={{ flex:1 }}>
                          <div style={{ fontSize:13,fontWeight:900,color:"#333" }}>{eng.name}</div>
                          <div style={{ fontSize:10,color:sp.col,fontWeight:800 }}>{sp.icon} {sp.label} · Stufe {engInst.level}</div>
                          {/* XP bar */}
                          <div style={{ height:4,background:"#f0f0f0",borderRadius:99,marginTop:4,overflow:"hidden" }}>
                            <div style={{ height:"100%",background:sp.col,width:`${xpPct}%`,borderRadius:99,transition:"width .5s" }}/>
                          </div>
                          <div style={{ fontSize:8,color:"#aaa",marginTop:1 }}>XP: {Math.floor(engInst.xp||0)} · Nächste Stufe bei {engInst.level*100}</div>
                        </div>
                        <button onClick={()=>fireEngineer(engInst.id)} style={{ fontSize:12,background:"none",border:"none",cursor:"pointer",color:"#ddd",padding:"4px" }}>✕</button>
                      </div>

                      {/* Current assignment */}
                      <div style={{ background:engInst.assignment==='research'?"#E8F5E9":engInst.assignment==='tuning'?`${TUNING_LEVELS.find(t=>t.id===engInst.tuningId)?.col||"#FF9800"}15`:engInst.assignment==='line'?"#E3F2FD":"#f5f5f5",borderRadius:10,padding:"8px 10px",marginBottom:8 }}>
                        <div style={{ fontSize:10,fontWeight:800,color:engInst.assignment==='research'?"#4CAF50":engInst.assignment==='tuning'?TUNING_LEVELS.find(t=>t.id===engInst.tuningId)?.col||"#FF9800":engInst.assignment==='line'?"#2196F3":"#aaa" }}>
                          {engInst.assignment==='research'?`🔬 Blaupause: ${assignedBp?.name||'?'} (${bpPct}%)`:
                           engInst.assignment==='tuning'?`${TUNING_LEVELS.find(t=>t.id===engInst.tuningId)?.icon||'🔧'} Forscht: ${TUNING_LEVELS.find(t=>t.id===engInst.tuningId)?.label||'?'} (${Math.round(((gs.tuningResearch||{})[engInst.tuningId]||0)/((TUNING_LEVELS.find(t=>t.id===engInst.tuningId)?.researchCost)||1)*100)}%)`:
                           engInst.assignment==='line'?`⚡ Linie ${(engInst.lineId||0)+1} boosten`:'😴 Unzugewiesen'}
                        </div>
                        {(assignedBp||(engInst.assignment==='tuning'&&engInst.tuningId))&&(
                          <div style={{ height:5,background:"rgba(0,0,0,0.1)",borderRadius:99,marginTop:5,overflow:"hidden" }}>
                            <div style={{ height:"100%",background:engInst.assignment==='tuning'?TUNING_LEVELS.find(t=>t.id===engInst.tuningId)?.col:"#4CAF50",width:`${engInst.assignment==='tuning'?Math.round(((gs.tuningResearch||{})[engInst.tuningId]||0)/((TUNING_LEVELS.find(t=>t.id===engInst.tuningId)?.researchCost)||1)*100):bpPct}%`,transition:"width .3s",borderRadius:99,position:"relative",overflow:"hidden" }}>
                              <div style={{ position:"absolute",inset:0,background:"linear-gradient(90deg,transparent,rgba(255,255,255,0.5),transparent)",animation:"shine 1.5s ease infinite" }}/>
                            </div>
                          </div>
                        )}
                      </div>

                      {/* Assignment buttons */}
                      <div style={{ display:"flex",gap:6,flexWrap:"wrap" }}>
                        <button onClick={()=>assignEngineerLine(engInst.id,null)} style={{ fontSize:9,padding:"5px 10px",borderRadius:8,border:`1px solid #e0e0e0`,background:engInst.assignment==='idle'?"#f0f0f0":"#fff",fontWeight:800,cursor:"pointer",color:"#888" }}>😴 Pause</button>
                        {/* Line boost buttons — all specs */}
                        {visLines.filter(l=>l.unlocked).map(line=>(
                          <button key={line.id} onClick={()=>assignEngineerLine(engInst.id,line.id)} style={{ fontSize:9,padding:"5px 10px",borderRadius:8,border:`1px solid ${LINE_COLORS[line.id]||"#ccc"}66`,background:engInst.lineId===line.id&&engInst.assignment==='line'?`${LINE_COLORS[line.id]||"#ccc"}22`:"#fff",fontWeight:800,cursor:"pointer",color:LINE_COLORS[line.id]||"#ccc" }}>⚡ L{line.id+1}</button>
                        ))}
                        {/* Tuning research — available to research+hybrid spec */}
                        {(eng.spec==='research'||eng.spec==='hybrid')&&TUNING_LEVELS.filter(tl=>!(gs.tuningUnlocked||{})[tl.id]).map(tl=>(
                          <button key={tl.id} onClick={()=>assignEngineerTuning(engInst.id,tl.id)} style={{ fontSize:9,padding:"5px 10px",borderRadius:8,border:`1px solid ${tl.col}88`,background:engInst.tuningId===tl.id&&engInst.assignment==='tuning'?`${tl.col}22`:"#fff",fontWeight:800,cursor:"pointer",color:tl.col }}>
                            {tl.icon} {tl.label.split('-')[0]}
                          </button>
                        ))}
                        {/* Blueprint research — research spec only */}
                        {eng.spec==='research'&&BLUEPRINTS.filter(b=>b.cityIdx<=ci&&!(gs.blueprints||{})[b.id]).slice(0,3).map(bp=>(
                          <button key={bp.id} onClick={()=>assignEngineerResearch(engInst.id,bp.id)} style={{ fontSize:9,padding:"5px 10px",borderRadius:8,border:`1px solid #4CAF5066`,background:engInst.blueprintId===bp.id&&engInst.assignment==='research'?"#E8F5E9":"#fff",fontWeight:800,cursor:"pointer",color:"#4CAF50" }}>🔬 {bp.emoji}</button>
                        ))}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {/* Hire new engineers */}
            {(gs.engineers||[]).length < engSlots && availableEngineers.length>0 &&(
              <div>
                <div style={{ fontSize:11,fontWeight:900,color:"#333",letterSpacing:0.5,marginBottom:8 }}>👔 VERFÜGBARE INGENIEURE</div>
                {availableEngineers.map(eng=>{
                  const sp=ENG_SPECS[eng.spec];
                  const cost=eng.baseSalary*10;
                  const canHire=gs.money>=cost;
                  return (
                    <div key={eng.id} style={{ background:"#fff",border:`2px solid ${canHire?sp.col+"44":"#e8e8e8"}`,borderRadius:16,padding:"12px 14px",marginBottom:10,display:"flex",alignItems:"center",gap:12,boxShadow:`0 3px 0 ${canHire?sp.col+"22":"#e8e8e8"}` }}>
                      <div style={{ fontSize:28 }}>{eng.emoji}</div>
                      <div style={{ flex:1 }}>
                        <div style={{ fontSize:13,fontWeight:900,color:"#333" }}>{eng.name}</div>
                        <div style={{ fontSize:10,color:sp.col,fontWeight:800,marginTop:1 }}>{sp.icon} {sp.label}</div>
                        <div style={{ fontSize:9,color:"#aaa",marginTop:2 }}>{sp.desc} · Gehalt: {fmtE(eng.baseSalary)}/Tag</div>
                      </div>
                      <button onClick={()=>hireEngineer(eng.id)} style={{ padding:"8px 14px",background:canHire?sp.col:"#eee",border:"none",borderRadius:12,color:canHire?"#fff":"#bbb",fontWeight:900,fontSize:11,cursor:canHire?"pointer":"default",boxShadow:canHire?`0 4px 0 ${sp.col}66`:"none",fontFamily:"'Nunito',sans-serif",whiteSpace:"nowrap" }}>
                        {fmtE(cost)}
                      </button>
                    </div>
                  );
                })}
              </div>
            )}
            {(gs.engineers||[]).length >= engSlots && (
              <div style={{ textAlign:"center",padding:"16px",color:"#aaa",fontSize:11,fontWeight:700 }}>🏗️ Alle {engSlots} Slots belegt — reise weiter für mehr Slots</div>
            )}

            {/* Completed blueprints showcase */}
            {Object.keys(gs.blueprints||{}).length>0&&(
              <div style={{ marginTop:16 }}>
                <div style={{ fontSize:11,fontWeight:900,color:"#333",letterSpacing:0.5,marginBottom:8 }}>✅ ABGESCHLOSSENE PROTOTYPEN</div>
                {BLUEPRINTS.filter(b=>(gs.blueprints||{})[b.id]).map(bp=>(
                  <div key={bp.id} style={{ background:"linear-gradient(135deg,#0a1628,#1a2e4a)",border:"2px solid #4CAF5066",borderRadius:14,padding:"10px 14px",marginBottom:8,display:"flex",alignItems:"center",gap:10 }}>
                    <span style={{ fontSize:26 }}>{bp.emoji}</span>
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:12,fontWeight:900,color:"#4CAF50" }}>{bp.name}</div>
                      <div style={{ fontSize:9,color:"#888",marginTop:1 }}>{bp.desc}</div>
                    </div>
                    <div style={{ textAlign:"right" }}>

            </div>
            <div style={{ display:"flex",flexDirection:"column",gap:10,marginBottom:20 }}>
              {PRESTIGE_BONUS_OPTIONS.map(opt=>{
                const col=opt.effect==="speed"?"#2196F3":opt.effect==="value"?"#9C27B0":"#4CAF50";
                return (
                  <button key={opt.id} onClick={()=>prestige(opt.effect)}
                    style={{ padding:"16px 18px",background:`${col}12`,border:`3px solid ${col}55`,borderRadius:18,cursor:"pointer",display:"flex",alignItems:"center",gap:14,fontFamily:"'Nunito',sans-serif",boxShadow:`0 4px 0 ${col}33`,transition:"all .15s" }}>
                    <span style={{ fontSize:32 }}>{opt.icon}</span>
                    <div style={{ textAlign:"left",flex:1 }}>
                      <div style={{ fontSize:15,fontWeight:900,color:"#222" }}>{opt.name}</div>
                      <div style={{ fontSize:11,color:"#888",marginTop:2 }}>{opt.desc}</div>
                    </div>
                    <div style={{ fontSize:20,color:col }}>›</div>
                  </button>
                );
              })}
            </div>
            <button onClick={()=>setShowPresBonus(false)} style={{ width:"100%",padding:13,background:"#f5f5f5",border:"2px solid #e8e8e8",borderRadius:16,color:"#999",cursor:"pointer",fontWeight:800,fontSize:13,fontFamily:"'Nunito',sans-serif" }}>Zurück</button>
          </div>
        </div>
      )}

      {/* ══ ROADMAP — Bottom Sheet ══ */}
      {showMap&&(
        <div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",zIndex:300,display:"flex",alignItems:"flex-end",animation:"sheetBg .2s ease" }} onClick={()=>setShowMap(false)}>
          <div onClick={e=>e.stopPropagation()} style={{ background:"#F8F9FA",borderRadius:"24px 24px 0 0",padding:"0 0 44px",width:"100%",maxWidth:430,margin:"0 auto",animation:"slideUp .3s cubic-bezier(0.22,1,0.36,1)",maxHeight:"82vh",display:"flex",flexDirection:"column",boxShadow:"0 -8px 40px rgba(0,0,0,0.2)" }}>
            <div style={{ padding:"18px 20px 0",flexShrink:0 }}>
              <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6 }}>
                <div style={{ fontSize:18,fontFamily:"'Fredoka One',cursive",color:"#222" }}>🗺️ Städte-Roadmap</div>
                <button onClick={()=>setShowMap(false)} style={{ width:32,height:32,borderRadius:99,background:"#ebebeb",border:"none",fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"#888" }}>✕</button>
              </div>
              <div style={{ width:40,height:4,background:"#e0e0e0",borderRadius:99,margin:"0 auto 16px" }}/>
            </div>
            <div style={{ overflowY:"auto",padding:"0 20px",flex:1 }}>
              {CITIES.map((c,i)=>{
                const r=PRESTIGE[i]; const past=i<ci; const cur=i===ci;
                return (
                  <div key={c.name} style={{ display:"flex",gap:14,marginBottom:18,opacity:!past&&!cur?0.35:1 }}>
                    <div style={{ display:"flex",flexDirection:"column",alignItems:"center",flexShrink:0 }}>
                      <div style={{ width:44,height:44,borderRadius:14,background:cur?`${c.accent}22`:past?"#E8F5E9":"#f5f5f5",border:`3px solid ${cur?c.accent:past?"#4CAF50":"#e0e0e0"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,boxShadow:cur?`0 4px 0 ${c.accent}55`:"none" }}>
                        {past?"✅":cur?"▶️":c.flag}
                      </div>
                      {i<CITIES.length-1&&<div style={{ width:3,flex:1,background:past?"#4CAF5033":"#f0f0f0",minHeight:14,marginTop:4,borderRadius:99 }}/>}
                    </div>
                    <div style={{ flex:1,paddingBottom:8 }}>
                      <div style={{ fontSize:13,fontWeight:900,color:cur?c.accent:past?"#4CAF50":"#777",display:"flex",alignItems:"center",gap:6,flexWrap:"wrap" }}>
                        {c.flag} {c.name}
                        <span style={{ fontSize:9,background:cur?c.accent+"22":"#f0f0f0",color:cur?c.accent:"#aaa",borderRadius:20,padding:"2px 8px",fontWeight:700 }}>
                          {c.maxLines} Linien · {CITY_MODELS[i].length} Modelle
                        </span>
                      </div>
                      {r&&cur&&(
                        <div style={{ marginTop:6,display:"flex",flexDirection:"column",gap:4 }}>
                          {[[fmtE(r.money),(gs.totalEarned||0)>=r.money,"💰"],[`${r.cars} Autos`,gs.totalBuilt>=r.cars,"🚗"]].map(([l,ok,ic])=>(
                            <div key={l} style={{ fontSize:10,color:ok?"#4CAF50":"#bbb",fontWeight:700,display:"flex",alignItems:"center",gap:4 }}>
                              <span>{ok?"✅":"⭕"}</span>{ic} {l} {ok&&"erledigt"}
                            </div>
                          ))}
                        </div>
                      )}
                      {past&&<div style={{ fontSize:10,color:"#4CAF50",fontWeight:700,marginTop:4 }}>✅ Abgeschlossen</div>}
                      {!r&&<div style={{ fontSize:10,color:"#FFD700",fontWeight:700,marginTop:4 }}>🏆 Endstufe — Cyberspace!</div>}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}

      {/* ══ PRESTIGE BESTÄTIGUNG — Center Modal ══ */}
      {showPre&&(
        <div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,0.65)",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:20,animation:"fadeIn .2s ease" }}>
          <div style={{ background:"#fff",borderRadius:24,padding:"28px 20px",width:"100%",maxWidth:360,animation:"scaleIn .3s cubic-bezier(0.34,1.56,0.64,1)",border:`4px solid ${city.accent}`,boxShadow:"0 20px 60px rgba(0,0,0,0.4)" }}>
            <div style={{ textAlign:"center",marginBottom:20 }}>
              <div style={{ fontSize:60,animation:"float 2s ease-in-out infinite" }}>{CITIES[ci+1]?.flag||"🏆"}</div>
              <div style={{ fontSize:22,fontFamily:"'Fredoka One',cursive",color:city.accent,marginTop:10 }}>Auf nach {CITIES[ci+1]?.name||"Cyberspace"}!</div>
              <div style={{ fontSize:12,color:"#aaa",marginTop:4 }}>Prestige {ci+1} von {CITIES.length-1}</div>
            </div>
            <div style={{ background:"#F8F9FA",borderRadius:16,padding:"14px 16px",marginBottom:20,display:"flex",flexDirection:"column",gap:8 }}>
              {[
                {icon:"💰",label:"Kasse",value:`→ 10% behalten (${fmtE(Math.round(gs.money*0.1))})`,ok:true},
                {icon:"🏭",label:"Linien",value:`${CITIES[ci+1]?.maxLines||5} Linien möglich`,ok:true},
                {icon:"🚗",label:"Modelle",value:`${CITY_MODELS[ci+1]?.length||3} neue Fahrzeuge`,ok:true},
                {icon:"🔬",label:"Forschung",value:"Alle Techs bleiben erhalten",ok:true},
                {icon:"👷",label:"Arbeiter",value:"3 Facharbeiter zum Start",ok:true},
              ].map(({icon,label,value,ok})=>(
                <div key={label} style={{ display:"flex",alignItems:"center",gap:10 }}>
                  <span style={{ fontSize:18,minWidth:24,textAlign:"center" }}>{icon}</span>
                  <div style={{ flex:1 }}>
                    <span style={{ fontSize:11,fontWeight:900,color:"#555" }}>{label}: </span>
                    <span style={{ fontSize:11,color:"#888" }}>{value}</span>
                  </div>
                  <span style={{ fontSize:14,color:ok?"#4CAF50":"#FF9800" }}>{ok?"✅":"⚠️"}</span>
                </div>
              ))}
            </div>
            <div style={{ display:"flex",gap:10 }}>
              <button onClick={()=>setShowPre(false)} style={{ flex:1,padding:14,background:"#f5f5f5",border:"2px solid #e8e8e8",borderRadius:16,color:"#999",cursor:"pointer",fontWeight:800,fontSize:13,fontFamily:"'Nunito',sans-serif" }}>Zurück</button>
              <button onClick={()=>{setShowPre(false);setShowPresBonus(true);}} style={{ flex:2,padding:14,background:`linear-gradient(135deg,${city.accent},${city.accent}bb)`,border:"none",borderRadius:16,color:"#fff",cursor:"pointer",fontWeight:900,fontSize:15,fontFamily:"'Fredoka One',cursive",boxShadow:`0 6px 0 ${city.accent}88` }}>
                ✨ Prestige — Los!
              </button>
            </div>
          </div>
        </div>
      )}
      {/* ══ ADMIN PANEL ══ */}
      {showAdmin&&(
        <div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:500,display:"flex",alignItems:"flex-end",animation:"sheetBg .2s ease" }} onClick={()=>setShowAdmin(false)}>
          <div onClick={e=>e.stopPropagation()} style={{ background:"#111",borderRadius:"24px 24px 0 0",padding:"0 0 48px",width:"100%",maxWidth:430,margin:"0 auto",animation:"slideUp .3s cubic-bezier(0.22,1,0.36,1)",maxHeight:"90vh",display:"flex",flexDirection:"column",boxShadow:"0 -8px 60px rgba(255,107,53,0.3)" }}>
            {/* Header */}
            <div style={{ padding:"18px 20px 12px",borderBottom:"1px solid #222",flexShrink:0 }}>
              <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between" }}>
                <div>
                  <div style={{ fontSize:18,fontWeight:900,color:"#FF6B35",fontFamily:"'Fredoka One',cursive" }}>⚡ Admin Panel</div>
                  <div style={{ fontSize:10,color:"#555",marginTop:1 }}>5× Kasse tippen zum Öffnen · Tipp: Cheats nach Test deaktivieren</div>
                </div>
                <button onClick={()=>setShowAdmin(false)} style={{ width:32,height:32,borderRadius:99,background:"#222",border:"none",color:"#888",fontSize:16,cursor:"pointer" }}>✕</button>
              </div>
              <div style={{ width:40,height:4,background:"#333",borderRadius:99,margin:"12px auto 0" }}/>
            </div>
            <div style={{ overflowY:"auto",padding:"16px 20px",flex:1,display:"flex",flexDirection:"column",gap:16 }}>

              {/* Speed control */}
              <div>
                <div style={{ fontSize:10,fontWeight:900,color:"#555",letterSpacing:1,marginBottom:8 }}>⏩ SPIELGESCHWINDIGKEIT</div>
                <div style={{ display:"flex",gap:8 }}>
                  {[[1,"🐢 Normal"],[5,"🐇 ×5"],[25,"⚡ ×25"],[100,"🚀 ×100"]].map(([spd,label])=>(
                    <button key={spd} onClick={()=>{ setAdminSpeed(spd); setCheatMode(spd>1); }} style={{ flex:1,padding:"10px 4px",borderRadius:14,border:`2px solid ${adminSpeed===spd?"#FF6B35":"#333"}`,background:adminSpeed===spd?"#FF6B3522":"#1a1a1a",color:adminSpeed===spd?"#FF6B35":"#666",fontWeight:900,fontSize:11,cursor:"pointer",fontFamily:"'Nunito',sans-serif" }}>
                      {label}
                    </button>
                  ))}
                </div>
              </div>

              {/* Money */}
              <div>
                <div style={{ fontSize:10,fontWeight:900,color:"#555",letterSpacing:1,marginBottom:8 }}>💰 GELD HINZUFÜGEN</div>
                <div style={{ display:"flex",gap:8,flexWrap:"wrap" }}>
                  {[[10000,"10k"],[1000000,"1M"],[1000000000,"1Mrd"],[1000000000000,"1Bio"]].map(([amt,label])=>(
                    <button key={label} onClick={()=>setGS(p=>({...p,money:p.money+amt,totalEarned:(p.totalEarned||0)+amt}))} style={{ flex:1,padding:"10px 8px",borderRadius:12,border:"2px solid #2a2a2a",background:"#1a1a1a",color:"#4CAF50",fontWeight:900,fontSize:12,cursor:"pointer",fontFamily:"'Nunito',sans-serif",minWidth:60 }}>
                      +{label}
                    </button>
                  ))}
                </div>
              </div>

              {/* City jump */}
              <div>
                <div style={{ fontSize:10,fontWeight:900,color:"#555",letterSpacing:1,marginBottom:8 }}>🌍 STADT WECHSELN</div>
                <div style={{ display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6 }}>
                  {CITIES.map((c,i)=>(
                    <button key={i} onClick={()=>{
                      if(i<=ci) return;
                      const firstId = CITY_MODELS[i][0].id;
                      setGS(p=>({...p,cityIdx:i,money:p.money*0.1,totalWorkers:3,lines:Array.from({length:MAX_LINES},(_,idx)=>({id:idx,unlocked:idx<CITIES[i].maxLines?idx===0:false,workers:idx===0?1:0,modelId:firstId,stIdx:0,prog:0,ready:false})),parked:[],contracts:[],lineSpecs:{},lastTickMs:Date.now(),unlockedModels:{...p.unlockedModels,[firstId]:true},modelUpgrades:{...p.modelUpgrades,[firstId]:0}}));
                      notify(`✈️ Reise nach ${c.name}!`);
                      setShowAdmin(false);
                    }} style={{ padding:"7px 4px",borderRadius:10,border:`2px solid ${i===ci?"#FF6B35":i<ci?"#2a5a2a":"#2a2a2a"}`,background:i===ci?"#FF6B3522":i<ci?"#1a2e1a":"#1a1a1a",color:i===ci?"#FF6B35":i<ci?"#4CAF50":"#555",fontSize:9,fontWeight:800,cursor:i>ci?"pointer":"default",fontFamily:"'Nunito',sans-serif",textAlign:"center" }}>
                      {c.flag}<br/>{c.name.split(' ')[0]}
                    </button>
                  ))}
                </div>
              </div>

              {/* Unlock & research shortcuts */}
              <div>
                <div style={{ fontSize:10,fontWeight:900,color:"#555",letterSpacing:1,marginBottom:8 }}>🔓 FREISCHALTEN</div>
                <div style={{ display:"flex",flexDirection:"column",gap:8 }}>
                  {/* Unlock all current city models */}
                  <button onClick={()=>{
                    const mods = CITY_MODELS[ci].reduce((a,m)=>({...a,[m.id]:true}),{});
                    const upgs = CITY_MODELS[ci].reduce((a,m)=>({...a,[m.id]:0}),{});
                    setGS(p=>({...p,unlockedModels:{...p.unlockedModels,...mods},modelUpgrades:{...(p.modelUpgrades||{}),...upgs}}));
                    notify('🚗 Alle Modelle der Stadt freigeschaltet!');
                  }} style={{ padding:"11px 14px",borderRadius:14,border:"2px solid #2a3a2a",background:"#1a2a1a",color:"#4CAF50",fontWeight:900,fontSize:12,cursor:"pointer",fontFamily:"'Nunito',sans-serif",textAlign:"left" }}>
                    🚗 Alle Stadtmodelle freischalten
                  </button>
                  {/* Unlock all tuning */}
                  <button onClick={()=>{
                    const unlocked = TUNING_LEVELS.reduce((a,tl)=>({...a,[tl.id]:true}),{});
                    const research = TUNING_LEVELS.reduce((a,tl)=>({...a,[tl.id]:tl.researchCost}),{});
                    setGS(p=>({...p,tuningUnlocked:unlocked,tuningResearch:research}));
                    notify('🔧 Alle Tuning-Methoden freigeschaltet!');
                  }} style={{ padding:"11px 14px",borderRadius:14,border:"2px solid #3a2a2a",background:"#2a1a1a",color:"#FF9800",fontWeight:900,fontSize:12,cursor:"pointer",fontFamily:"'Nunito',sans-serif",textAlign:"left" }}>
                    🔧 Alle Tuning-Methoden freischalten
                  </button>
                  {/* Add engineer */}
                  <button onClick={()=>{
                    const available = ENGINEER_POOL.filter(e=>e.city<=ci&&!(gs.engineers||[]).find(h=>h.engId===e.id));
                    if(!available.length){notify('Keine weiteren Ingenieure verfügbar');return;}
                    const eng = available[0];
                    setGS(p=>({...p,engineers:[...(p.engineers||[]),{id:`eng_${Date.now()}`,engId:eng.id,level:3,xp:200,assignment:'idle',lineId:null,blueprintId:null,researchProgress:0,tuningId:null}]}));
                    notify(`🧑‍🔬 ${eng.name} eingestellt (Stufe 3)!`);
                  }} style={{ padding:"11px 14px",borderRadius:14,border:"2px solid #2a2a3a",background:"#1a1a2a",color:"#2196F3",fontWeight:900,fontSize:12,cursor:"pointer",fontFamily:"'Nunito',sans-serif",textAlign:"left" }}>
                    🧑‍🔬 Nächsten Ingenieur einstellen (Stufe 3)
                  </button>
                  {/* Research all blueprints */}
                  <button onClick={()=>{
                    const bps = BLUEPRINTS.filter(b=>b.cityIdx<=ci).reduce((a,b)=>({...a,[b.id]:true}),{});
                    const mods = BLUEPRINTS.filter(b=>b.cityIdx<=ci).reduce((a,b)=>({...a,[b.id]:true}),{});
                    setGS(p=>({...p,blueprints:{...p.blueprints,...bps},unlockedModels:{...p.unlockedModels,...mods}}));
                    notify('🔬 Alle Blaupausen erforscht!');
                  }} style={{ padding:"11px 14px",borderRadius:14,border:"2px solid #2a3a2a",background:"#1a2a1a",color:"#4CAF50",fontWeight:900,fontSize:12,cursor:"pointer",fontFamily:"'Nunito',sans-serif",textAlign:"left" }}>
                    🔬 Alle Blaupausen abschließen
                  </button>
                  {/* Fill showroom */}
                  <button onClick={()=>{
                    const m=CITY_MODELS[ci][0];
                    const cars=Array.from({length:8},()=>({id:uid(),modelId:m.id,emoji:m.emoji,name:m.name,val:m.val,tuned:0,appliedTuning:[]}));
                    setGS(p=>({...p,parked:[...p.parked,...cars].slice(0,30)}));
                    notify('🏪 Showroom gefüllt!');
                  }} style={{ padding:"11px 14px",borderRadius:14,border:"2px solid #3a3a2a",background:"#2a2a1a",color:"#FFD700",fontWeight:900,fontSize:12,cursor:"pointer",fontFamily:"'Nunito',sans-serif",textAlign:"left" }}>
                    🏪 Showroom mit Autos füllen
                  </button>
                  {/* Hire all workers */}
                  <button onClick={()=>{
                    setGS(p=>({...p,totalWorkers:p.totalWorkers+10}));
                    notify('👷 10 Facharbeiter eingestellt!');
                  }} style={{ padding:"11px 14px",borderRadius:14,border:"2px solid #2a3a3a",background:"#1a2a2a",color:"#00BCD4",fontWeight:900,fontSize:12,cursor:"pointer",fontFamily:"'Nunito',sans-serif",textAlign:"left" }}>
                    👷 +10 Facharbeiter einstellen
                  </button>
                  {/* Research all techs */}
                  <button onClick={()=>{
                    const allTechs=TECH_TREE.filter(t=>t.city<=ci).reduce((a,t)=>({...a,[t.id]:true}),{});
                    setGS(p=>({...p,techs:{...p.techs,...allTechs}}));
                    notify('🧬 Alle verfügbaren Technologien erforscht!');
                  }} style={{ padding:"11px 14px",borderRadius:14,border:"2px solid #3a2a3a",background:"#2a1a2a",color:"#9C27B0",fontWeight:900,fontSize:12,cursor:"pointer",fontFamily:"'Nunito',sans-serif",textAlign:"left" }}>
                    🧬 Alle Techs der Stadt erforschen
                  </button>
                  {/* Salesman max */}
                  <button onClick={()=>{
                    setGS(p=>({...p,salesmanLvl:SALESMAN.length-1}));
                    notify('👑 Quanten-Händler eingestellt!');
                  }} style={{ padding:"11px 14px",borderRadius:14,border:"2px solid #3a2a2a",background:"#2a1a1a",color:"#E63946",fontWeight:900,fontSize:12,cursor:"pointer",fontFamily:"'Nunito',sans-serif",textAlign:"left" }}>
                    👑 Quanten-Händler (Max. Verkäufer)
                  </button>
                </div>
              </div>

              {/* Save controls */}
              <div>
                <div style={{ fontSize:10,fontWeight:900,color:"#555",letterSpacing:1,marginBottom:8 }}>💾 SPIELSTAND</div>
                <div style={{ display:"flex",gap:8 }}>
                  <button onClick={()=>saveNow(gs)} style={{ flex:1,padding:"11px 14px",borderRadius:14,border:"2px solid #2a3a2a",background:"#1a2a1a",color:"#4CAF50",fontWeight:900,fontSize:12,cursor:"pointer",fontFamily:"'Nunito',sans-serif" }}>
                    💾 Jetzt speichern
                  </button>
                  <button onClick={()=>{ const d=JSON.stringify(gs,null,0); navigator.clipboard?.writeText(d).then(()=>notify('📋 Save-Code kopiert!')).catch(()=>notify('❌ Nicht kopiert')); }} style={{ flex:1,padding:"11px 14px",borderRadius:14,border:"2px solid #2a2a3a",background:"#1a1a2a",color:"#2196F3",fontWeight:900,fontSize:12,cursor:"pointer",fontFamily:"'Nunito',sans-serif" }}>
                    📋 Code kopieren
                  </button>
                </div>
              </div>

              {/* Reset */}
              <div>
                <div style={{ fontSize:10,fontWeight:900,color:"#555",letterSpacing:1,marginBottom:8 }}>⚠️ GEFÄHRLICH</div>
                <button onClick={async ()=>{
                  if(!window.confirm('Wirklich alles zurücksetzen? Spielstand wird gelöscht!')) return;
                  deleteSave();
                  setShowAdmin(false);
                }} style={{ width:"100%",padding:"11px",borderRadius:14,border:"2px solid #3a1a1a",background:"#2a1a1a",color:"#E63946",fontWeight:900,fontSize:12,cursor:"pointer",fontFamily:"'Nunito',sans-serif" }}>
                  🗑️ Kompletter Reset (Neustart)
                </button>
              </div>

              {/* Game stats */}
              <div style={{ background:"#1a1a1a",borderRadius:14,padding:"12px 14px" }}>
                <div style={{ fontSize:10,fontWeight:900,color:"#555",letterSpacing:1,marginBottom:8 }}>📊 GAME STATE</div>
                {[
                  ["Stadt",`${city.name} (${ci+1}/${CITIES.length})`],
                  ["Kasse",fmtE(gs.money)],
                  ["Gesamtverdienst",fmtE(gs.totalEarned||0)],
                  ["Gebaut",gs.totalBuilt],
                  ["Verkauft",gs.totalSold],
                  ["Ingenieure",(gs.engineers||[]).length],
                  ["Tuning frei",Object.keys(gs.tuningUnlocked||{}).join(', ')||'Keines'],
                  ["Techs",Object.keys(gs.techs||{}).length],
                  ["Prestige-Count",gs.prestigeCount||0],
                  ["Spieltag",gs.gameDay],
                ].map(([k,v])=>(
                  <div key={k} style={{ display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px solid #222" }}>
                    <span style={{ fontSize:10,color:"#555" }}>{k}</span>
                    <span style={{ fontSize:10,color:"#aaa",fontWeight:700 }}>{v}</span>
                  </div>
                ))}
              </div>

            </div>
          </div>
        </div>
      )}

    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(AutoFactory));
  </script>
</body>
</html>
